<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&family=Lora:wght@400;600&display=swap" rel="stylesheet">

<style>
  /* ============ CSS VARIABLES / THEMES ============ */
  :root {
    --sidebar-w: 280px;
    --topbar-h: 52px;
    --radius: 8px;
    --transition: 0.2s ease;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'Fira Code', monospace;
    --font-display: 'Playfair Display', serif;
  }

  /* ---- BRIGHT (default) ---- */
  [data-theme="bright"] {
    --bg:          #f5f4ef;
    --bg2:         #eceae2;
    --sidebar-bg:  #ffffff;
    --topbar-bg:   #ffffff;
    --border:      #ddd9ce;
    --text:        #1a1814;
    --text-muted:  #7a7468;
    --accent:      #e05c2a;
    --accent2:     #f5a623;
    --link:        #c84b1e;
    --code-bg:     #f0ede4;
    --hover:       #fdf5ef;
    --sel-bg:      #fff0e8;
    --sel-border:  #e05c2a;
    --icon:        #9a948a;
    --scrollbar:   #d4cfc5;
    --shadow:      0 2px 12px rgba(0,0,0,0.08);
    --mermaid-theme: default;
  }

  /* ---- DARK ---- */
  [data-theme="dark"] {
    --bg:          #0f1117;
    --bg2:         #181c24;
    --sidebar-bg:  #13161e;
    --topbar-bg:   #13161e;
    --border:      #262b38;
    --text:        #d4dbe8;
    --text-muted:  #5a6478;
    --accent:      #7c9ef5;
    --accent2:     #a78bfa;
    --link:        #7c9ef5;
    --code-bg:     #1a1f2e;
    --hover:       #1e2333;
    --sel-bg:      #1e2740;
    --sel-border:  #7c9ef5;
    --icon:        #4a5568;
    --scrollbar:   #2a3044;
    --shadow:      0 2px 16px rgba(0,0,0,0.4);
    --mermaid-theme: dark;
  }

  /* ---- RED ---- */
  [data-theme="red"] {
    --bg:          #1a0505;
    --bg2:         #220909;
    --sidebar-bg:  #160404;
    --topbar-bg:   #160404;
    --border:      #3d1010;
    --text:        #f0d8d8;
    --text-muted:  #8a5555;
    --accent:      #ff4444;
    --accent2:     #ff8080;
    --link:        #ff6666;
    --code-bg:     #260909;
    --hover:       #2a0c0c;
    --sel-bg:      #330d0d;
    --sel-border:  #ff4444;
    --icon:        #6b3333;
    --scrollbar:   #3d1414;
    --shadow:      0 2px 16px rgba(255,0,0,0.12);
    --mermaid-theme: dark;
  }

  /* ---- PRESENTATION ---- */
  [data-theme="presentation"] {
    --bg:          #0a0a12;
    --bg2:         #12121e;
    --sidebar-bg:  #0d0d1a;
    --topbar-bg:   #0d0d1a;
    --border:      #1e1e3a;
    --text:        #e8e8ff;
    --text-muted:  #555577;
    --accent:      #00e5ff;
    --accent2:     #ff00aa;
    --link:        #00e5ff;
    --code-bg:     #10101e;
    --hover:       #151528;
    --sel-bg:      #0f1f30;
    --sel-border:  #00e5ff;
    --icon:        #333355;
    --scrollbar:   #1a1a30;
    --shadow:      0 0 20px rgba(0,229,255,0.08);
    --mermaid-theme: dark;
  }

  /* ---- SEPIA ---- */
  [data-theme="sepia"] {
    --bg:          #f2ead8;
    --bg2:         #e8dfc8;
    --sidebar-bg:  #faf4e4;
    --topbar-bg:   #faf4e4;
    --border:      #d4c8a8;
    --text:        #2c2010;
    --text-muted:  #8a7555;
    --accent:      #7a5c2a;
    --accent2:     #a07840;
    --link:        #7a5c2a;
    --code-bg:     #ebe0c4;
    --hover:       #f5edda;
    --sel-bg:      #f0e5c8;
    --sel-border:  #7a5c2a;
    --icon:        #a89070;
    --scrollbar:   #c8bca0;
    --shadow:      0 2px 12px rgba(60,40,10,0.1);
    --mermaid-theme: default;
  }

  /* ============ RESET & BASE ============ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    transition: background 0.3s, color 0.3s;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

  /* ============ LAYOUT ============ */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* Top bar */
  #topbar {
    height: var(--topbar-h);
    background: var(--topbar-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    z-index: 10;
  }

  #logo {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
    white-space: nowrap;
    margin-right: 4px;
  }

  #open-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-body);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity var(--transition), transform var(--transition);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  #open-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  #open-btn svg { flex-shrink: 0; }

  #folder-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 280px;
    flex: 1;
  }

  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Theme switcher */
  .theme-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-right: 2px;
  }

  .theme-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0;
  }
  .theme-btn:hover { transform: scale(1.15); }
  .theme-btn.active { border-color: var(--accent); }
  .theme-btn[data-t="bright"]       { background: #f5f4ef; box-shadow: inset 0 0 0 1px #ddd9ce; }
  .theme-btn[data-t="dark"]         { background: #0f1117; }
  .theme-btn[data-t="red"]          { background: linear-gradient(135deg,#1a0505,#ff4444); }
  .theme-btn[data-t="presentation"] { background: linear-gradient(135deg,#0a0a12,#00e5ff); }
  .theme-btn[data-t="sepia"]        { background: #f2ead8; box-shadow: inset 0 0 0 1px #d4c8a8; }

  /* Search */
  #search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  #search-wrap svg { position: absolute; left: 8px; color: var(--icon); pointer-events: none; }
  #search-input {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 10px 5px 28px;
    font-family: var(--font-body);
    font-size: 0.8rem;
    color: var(--text);
    width: 170px;
    outline: none;
    transition: border-color 0.2s, width 0.3s;
  }
  #search-input:focus { border-color: var(--accent); width: 210px; }
  #search-input::placeholder { color: var(--text-muted); }

  /* Body area */
  #body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    transition: width 0.3s ease;
  }
  #sidebar.collapsed { width: 0; border-right: none; }

  #sidebar-header {
    padding: 12px 14px 8px;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  #file-tree {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }

  #empty-state {
    padding: 32px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.82rem;
    line-height: 1.6;
  }
  #empty-state .emoji { font-size: 2.5rem; margin-bottom: 10px; display: block; }

  /* Tree nodes */
  .tree-folder {
    user-select: none;
  }

  .tree-folder-header {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 5px;
    margin: 1px 6px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-muted);
    transition: background var(--transition), color var(--transition);
  }
  .tree-folder-header:hover { background: var(--hover); color: var(--text); }

  .tree-folder-header .chevron {
    flex-shrink: 0;
    transition: transform 0.2s;
    color: var(--icon);
  }
  .tree-folder-header.open .chevron { transform: rotate(90deg); }

  .tree-folder-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tree-folder-children {
    padding-left: 14px;
    overflow: hidden;
    display: none;
  }
  .tree-folder-children.open { display: block; }

  .tree-file {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 5px;
    margin: 1px 6px;
    font-size: 0.82rem;
    color: var(--text-muted);
    transition: background var(--transition), color var(--transition);
    border-left: 2px solid transparent;
  }
  .tree-file:hover { background: var(--hover); color: var(--text); }
  .tree-file.active {
    background: var(--sel-bg);
    color: var(--accent);
    border-left-color: var(--sel-border);
    font-weight: 500;
  }
  .tree-file svg { flex-shrink: 0; opacity: 0.7; }
  .tree-file-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .tree-file.hidden { display: none; }

  /* Resize handle */
  #resize-handle {
    width: 4px;
    background: transparent;
    cursor: col-resize;
    flex-shrink: 0;
    position: relative;
    transition: background 0.2s;
  }
  #resize-handle:hover { background: var(--accent); }

  /* Main content */
  #content {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  /* Breadcrumb */
  #breadcrumb {
    padding: 8px 20px;
    font-size: 0.75rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    border-bottom: 1px solid var(--border);
    background: var(--sidebar-bg);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-shrink: 0;
    display: none;
  }

  /* Article */
  #article-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 40px 60px 80px;
  }

  #welcome {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-muted);
    gap: 16px;
    padding: 40px;
  }
  #welcome h2 { font-family: var(--font-display); font-size: 1.6rem; color: var(--text); }
  #welcome p { font-size: 0.88rem; line-height: 1.6; max-width: 340px; }

  /* ============ MARKDOWN STYLES ============ */
  #md-content {
    max-width: 820px;
    margin: 0 auto;
    line-height: 1.75;
  }

  #md-content h1 {
    font-family: var(--font-display);
    font-size: 2.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.2;
    letter-spacing: -0.02em;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--accent);
  }
  #md-content h2 {
    font-family: var(--font-display);
    font-size: 1.45rem;
    font-weight: 700;
    color: var(--text);
    margin: 36px 0 10px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }
  #md-content h3 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    margin: 28px 0 8px;
  }
  #md-content h4, #md-content h5, #md-content h6 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    margin: 20px 0 6px;
  }
  #md-content p { margin: 12px 0; color: var(--text); }
  #md-content a { color: var(--link); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; }
  #md-content a:hover { opacity: 0.75; }

  #md-content ul, #md-content ol {
    margin: 10px 0 10px 22px;
    color: var(--text);
  }
  #md-content li { margin: 4px 0; }

  #md-content blockquote {
    border-left: 3px solid var(--accent);
    padding: 8px 16px;
    margin: 16px 0;
    background: var(--bg2);
    border-radius: 0 var(--radius) var(--radius) 0;
    color: var(--text-muted);
    font-style: italic;
  }

  #md-content code {
    font-family: var(--font-mono);
    font-size: 0.85em;
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent);
  }

  #md-content pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    overflow-x: auto;
    margin: 16px 0;
  }
  #md-content pre code {
    background: none;
    padding: 0;
    color: var(--text);
    font-size: 0.84rem;
    line-height: 1.6;
  }

  #md-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 18px 0;
    font-size: 0.88rem;
  }
  #md-content th {
    background: var(--bg2);
    text-align: left;
    padding: 8px 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    color: var(--text);
  }
  #md-content td {
    padding: 7px 12px;
    border: 1px solid var(--border);
    color: var(--text);
  }
  #md-content tr:nth-child(even) td { background: var(--bg2); }

  #md-content hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

  #md-content img { max-width: 100%; border-radius: var(--radius); margin: 10px 0; }

  /* Mermaid */
  .mermaid-wrap {
    margin: 20px 0;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    justify-content: center;
    overflow-x: auto;
  }
  .mermaid-wrap svg { max-width: 100%; }

  /* Sidebar toggle */
  #toggle-sidebar {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 7px;
    cursor: pointer;
    color: var(--icon);
    display: flex;
    align-items: center;
    transition: background 0.2s, color 0.2s;
  }
  #toggle-sidebar:hover { background: var(--hover); color: var(--text); }

  /* Presentation theme extras */
  [data-theme="presentation"] #logo {
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.4);
  }
  [data-theme="presentation"] .tree-file.active { text-shadow: 0 0 10px rgba(0,229,255,0.3); }
  [data-theme="presentation"] #md-content h1 { text-shadow: 0 0 30px rgba(0,229,255,0.15); }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #md-content { animation: fadeIn 0.25s ease; }

  /* Mobile */
  @media (max-width: 600px) {
    :root { --sidebar-w: 220px; }
    #article-wrap { padding: 24px 20px 60px; }
    #search-input { width: 120px; }
    #search-input:focus { width: 140px; }
    .theme-label { display: none; }
  }
</style>
</head>
<body>

<div id="app" data-theme="bright">

  <!-- TOP BAR -->
  <header id="topbar">
    <span id="logo">✦ MD Viewer</span>

    <button id="open-btn" onclick="openFolder()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      Open Folder
    </button>

    <span id="folder-label">No folder selected</span>

    <div class="topbar-right">
      <!-- Search -->
      <div id="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search files…" oninput="filterTree(this.value)">
      </div>

      <!-- Sidebar toggle -->
      <button id="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>

      <!-- Themes -->
      <span class="theme-label">Theme</span>
      <button class="theme-btn active" data-t="bright"       title="Bright"       onclick="setTheme('bright')"></button>
      <button class="theme-btn"        data-t="dark"         title="Dark"         onclick="setTheme('dark')"></button>
      <button class="theme-btn"        data-t="red"          title="Red"          onclick="setTheme('red')"></button>
      <button class="theme-btn"        data-t="presentation" title="Presentation" onclick="setTheme('presentation')"></button>
      <button class="theme-btn"        data-t="sepia"        title="Sepia"        onclick="setTheme('sepia')"></button>
    </div>
  </header>

  <!-- BODY -->
  <div id="body">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        Files
      </div>
      <div id="file-tree">
        <div id="empty-state">
          <span class="emoji">📂</span>
          <span>Open a folder to explore your markdown files</span>
        </div>
      </div>
    </aside>

    <!-- RESIZE -->
    <div id="resize-handle"></div>

    <!-- MAIN -->
    <main id="content">
      <div id="breadcrumb"></div>
      <div id="article-wrap">
        <div id="welcome">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.4">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
          <h2>MD Viewer</h2>
          <p>Click <strong>Open Folder</strong> to load a directory of Markdown files. Your full file tree will appear on the left.</p>
        </div>
      </div>
    </main>

  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let fileTree = [];      // nested structure
let allFiles = [];      // flat list of {path, name, handle}
let activeFile = null;
let sidebarOpen = true;

// ============================================================
// MERMAID INIT
// ============================================================
function initMermaid(theme) {
  mermaid.initialize({
    startOnLoad: false,
    theme: theme || 'default',
    securityLevel: 'loose',
    fontFamily: 'Fira Code, monospace',
  });
}
initMermaid('default');

// ============================================================
// THEME
// ============================================================
function setTheme(t) {
  document.getElementById('app').setAttribute('data-theme', t);
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.t === t);
  });
  const mTheme = getComputedStyle(document.getElementById('app'))
    .getPropertyValue('--mermaid-theme').trim().replace(/"/g,'');
  initMermaid(mTheme);
  // Re-render mermaid if file is open
  if (activeFile) reRenderMermaid();
  localStorage.setItem('mdv-theme', t);
}

function reRenderMermaid() {
  document.querySelectorAll('.mermaid-wrap').forEach(el => {
    const code = el.dataset.code;
    if (code) renderMermaidBlock(el, code);
  });
}

// ============================================================
// SIDEBAR TOGGLE
// ============================================================
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
}

// ============================================================
// FOLDER OPEN
// ============================================================
async function openFolder() {
  if (!window.showDirectoryPicker) {
    alert('Your browser does not support the File System Access API.\nPlease use Chrome, Edge, or another Chromium-based browser.');
    return;
  }
  try {
    const dirHandle = await window.showDirectoryPicker({ mode: 'read' });
    document.getElementById('folder-label').textContent = dirHandle.name;
    allFiles = [];
    fileTree = await buildTree(dirHandle, '');
    renderTree();
    // Auto-open README.md from root if it exists, otherwise fall back to first file
    const readme = allFiles.find(f => f.name.toLowerCase() === 'readme.md' && !f.path.includes('/'));
    const toOpen = readme || allFiles[0];
    if (toOpen) openFile(toOpen);
  } catch (e) {
    if (e.name !== 'AbortError') console.error(e);
  }
}

async function buildTree(dirHandle, path) {
  const entries = [];
  for await (const entry of dirHandle.values()) {
    if (entry.name.startsWith('.')) continue;
    if (entry.kind === 'directory') {
      const children = await buildTree(entry, path ? path + '/' + entry.name : entry.name);
      if (children.length > 0) {
        entries.push({ type: 'folder', name: entry.name, path: path ? path + '/' + entry.name : entry.name, children });
      }
    } else if (entry.kind === 'file' && entry.name.toLowerCase().endsWith('.md')) {
      const filePath = path ? path + '/' + entry.name : entry.name;
      const fileObj = { type: 'file', name: entry.name, path: filePath, handle: entry };
      entries.push(fileObj);
      allFiles.push(fileObj);
    }
  }
  // Sort: folders first, then files, alphabetically
  entries.sort((a, b) => {
    if (a.type !== b.type) return a.type === 'folder' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  return entries;
}

// ============================================================
// RENDER TREE
// ============================================================
function renderTree() {
  const treeEl = document.getElementById('file-tree');
  if (allFiles.length === 0) {
    treeEl.innerHTML = '<div id="empty-state"><span class="emoji">🔍</span><span>No markdown files found in this folder.</span></div>';
    return;
  }
  treeEl.innerHTML = '';
  fileTree.forEach(node => treeEl.appendChild(createNode(node)));
}

function createNode(node) {
  if (node.type === 'folder') {
    return createFolderNode(node);
  } else {
    return createFileNode(node);
  }
}

function createFolderNode(node) {
  const div = document.createElement('div');
  div.className = 'tree-folder';
  div.dataset.path = node.path;

  const header = document.createElement('div');
  header.className = 'tree-folder-header open';
  header.innerHTML = `
    <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
    </svg>
    <span class="tree-folder-name">${escHtml(node.name)}</span>
  `;

  const children = document.createElement('div');
  children.className = 'tree-folder-children open';
  node.children.forEach(child => children.appendChild(createNode(child)));

  header.addEventListener('click', () => {
    const isOpen = header.classList.toggle('open');
    children.classList.toggle('open', isOpen);
  });

  div.appendChild(header);
  div.appendChild(children);
  return div;
}

function createFileNode(node) {
  const div = document.createElement('div');
  div.className = 'tree-file';
  div.dataset.path = node.path;
  div.innerHTML = `
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <span class="tree-file-name">${escHtml(node.name.replace(/\.md$/i, ''))}</span>
  `;
  div.addEventListener('click', () => openFile(node));
  return div;
}

// ============================================================
// OPEN FILE
// ============================================================
async function openFile(fileObj) {
  if (activeFile === fileObj) return;
  activeFile = fileObj;

  // Update sidebar selection
  document.querySelectorAll('.tree-file').forEach(el => {
    el.classList.toggle('active', el.dataset.path === fileObj.path);
  });

  // Scroll active item into view
  const activeEl = document.querySelector('.tree-file.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });

  // Show breadcrumb
  const bc = document.getElementById('breadcrumb');
  bc.textContent = fileObj.path;
  bc.style.display = 'block';

  // Read file
  const file = await fileObj.handle.getFile();
  const text = await file.text();

  // Render
  renderMarkdown(text);
}

// ============================================================
// RENDER MARKDOWN
// ============================================================
function renderMarkdown(text) {
  const wrap = document.getElementById('article-wrap');

  // Extract and replace mermaid blocks before marked parses
  const mermaidBlocks = [];
  const placeholder = '___MERMAID_PLACEHOLDER___';

  const preprocessed = text.replace(/```mermaid\n([\s\S]*?)```/g, (_, code) => {
    mermaidBlocks.push(code.trim());
    return `\n\n${placeholder}${mermaidBlocks.length - 1}\n\n`;
  });

  // Parse markdown
  let html = marked.parse(preprocessed, { breaks: true, gfm: true });

  // Replace placeholders with mermaid divs
  html = html.replace(new RegExp(`<p>${placeholder}(\\d+)<\/p>`, 'g'), (_, i) => {
    return `<div class="mermaid-wrap" id="mermaid-${i}" data-code="${escAttr(mermaidBlocks[parseInt(i)])}"></div>`;
  });
  // Also handle without <p> wrap
  html = html.replace(new RegExp(`${placeholder}(\\d+)`, 'g'), (_, i) => {
    return `<div class="mermaid-wrap" id="mermaid-${i}" data-code="${escAttr(mermaidBlocks[parseInt(i)])}"></div>`;
  });

  wrap.innerHTML = `<div id="md-content">${html}</div>`;

  // Render mermaid blocks
  document.querySelectorAll('.mermaid-wrap').forEach(el => {
    renderMermaidBlock(el, el.dataset.code);
  });
}

async function renderMermaidBlock(el, code) {
  el.innerHTML = '';
  try {
    const id = 'mermaid-svg-' + Math.random().toString(36).slice(2);
    const { svg } = await mermaid.render(id, code);
    el.innerHTML = svg;
  } catch (e) {
    el.innerHTML = `<pre style="color:var(--accent);font-size:0.75rem;white-space:pre-wrap;">[Mermaid error]\n${escHtml(e.message)}</pre>`;
  }
}

// ============================================================
// SEARCH / FILTER
// ============================================================
function filterTree(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('.tree-file').forEach(el => {
    const name = el.dataset.path.toLowerCase();
    el.classList.toggle('hidden', q !== '' && !name.includes(q));
  });
  // Show/hide folders with all-hidden children
  document.querySelectorAll('.tree-folder').forEach(folder => {
    const anyVisible = [...folder.querySelectorAll('.tree-file')].some(f => !f.classList.contains('hidden'));
    folder.style.display = q === '' ? '' : (anyVisible ? '' : 'none');
  });
}

// ============================================================
// RESIZE HANDLE
// ============================================================
const resizeHandle = document.getElementById('resize-handle');
let resizing = false, startX = 0, startW = 0;

resizeHandle.addEventListener('mousedown', e => {
  resizing = true;
  startX = e.clientX;
  startW = document.getElementById('sidebar').offsetWidth;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const newW = Math.max(160, Math.min(500, startW + e.clientX - startX));
  document.getElementById('sidebar').style.width = newW + 'px';
  document.documentElement.style.setProperty('--sidebar-w', newW + 'px');
});

document.addEventListener('mouseup', () => {
  resizing = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// ============================================================
// UTILS
// ============================================================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ============================================================
// RESTORE THEME
// ============================================================
const savedTheme = localStorage.getItem('mdv-theme');
if (savedTheme) setTheme(savedTheme);

// Keyboard shortcut: Cmd/Ctrl+Shift+E to open folder
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'e') {
    e.preventDefault();
    openFolder();
  }
});
</script>
