                    function runFilter() {
                        // Reset sorting whenever filters/grouping change so the UI stays consistent.
                        sortConfig = {
                            column: null,
                            direction: "asc"
                        };

                        // 1. Get the global search term and normalize it. This is the value from serach textbox
                        const search = document.getElementById("globalSearch").value.toLowerCase();

                        // --- PREP THE KITCHEN: Grab DOM values ONCE before the loop ---
                        const filterSettings = selectedFilterCols.map(col => {
                            const minEl = document.getElementById(`date-min-${col}`);
                            const maxEl = document.getElementById(`date-max-${col}`);
                            const blankEl = document.getElementById(`blank-${col}`);
                            
                            return {
                                col: col,
                                minTime: minEl?.value ? new Date(minEl.value).setHours(0,0,0,0) : null,
                                maxTime: maxEl?.value ? new Date(maxEl.value).setHours(0,0,0,0) : null,
                                showBlanks: blankEl?.checked || false,
                                hasFilter: minEl?.value || maxEl?.value,
                                selections: activeSelections[col]
                            };
                        });

                        // Start the Spinner
                        //showLoading();

                        // 2. Filter the data based on your criteria
                        // --- THE HIGH-SPEED HIGHWAY ---
                        filteredDataGlobal = rawData.filter((row) => {
                            // 1. Optimized Global Search (Use .some instead of joining everything)
                            if (search) {
                                const matches = Object.values(row).some(val => 
                                    String(val).toLowerCase().includes(search)
                                );
                                if (!matches) return false;
                            }

                            // 2. Optimized Column Filters (Use the pre-grabbed settings)
                            return filterSettings.every((f) => {
                                const rawVal = row[f.col];
                                
                                // Date Logic using pre-calculated minTime/maxTime
                                if (f.minTime || f.maxTime || f.showBlanks) {
                                    const cellDate = (rawVal === null || rawVal === undefined) ? null : excelSerialToJsDate(rawVal);
                                    
                                    if (!cellDate || isNaN(cellDate.getTime())) {
                                        if (f.showBlanks) return true;
                                        return !f.hasFilter;
                                    }
                                    
                                    const cellTime = cellDate.setHours(0,0,0,0);
                                    if (f.minTime && cellTime < f.minTime) return false;
                                    if (f.maxTime && cellTime > f.maxTime) return false;
                                }

                                // Multiselect Logic
                                if (f.selections && f.selections.size > 0) {
                                    const formatted = String(formatExcelDate(rawVal) ?? "");
                                    const displayVal = (rawVal === null || formatted.trim() === "") ? "(Blanks)" : formatted;
                                    if (!f.selections.has(displayVal)) return false;
                                }

                                return true;
                            });
                        });

                                
                        showFilterStatus(filteredDataGlobal.length);

                        // 2. Update the counter UI (e.g., "15 / 100")
                        const statsEl = document.getElementById("stats");
                        if (statsEl) {
                            statsEl.innerText = `${filteredDataGlobal.length} / ${rawData.length}`;
                        }

                        // 3. Refresh the table and charts
                        updateTable(filteredDataGlobal);
                        updateDateRangeChart();

                        // 5. Log activity if Dev Mode is active
                        if (typeof logDebug === "function") {
                            logDebug(`Filter executed: ${filteredDataGlobal.length} results found.`, );
                        }
                    }

                    function updateTable(data) {
                        const tHead = document.getElementById("tHead")
                          , tBody = document.getElementById("tBody");

                        const groupByCols = getSelectedGroupByCols();
                        const aggValue = document.getElementById("aggColumn").value
                          , [mode,targetCol] = aggValue.split("|");
                        const gran = document.getElementById("dateGranularity").value;

                        const aggKey = mode === "DISTINCT" ? `DISTINCT - ${targetCol || "Value"}` : mode || "Count";

                        // Helper to escape HTML and prevent XSS
                        const escapeHTML = (str)=>{
                            if (typeof str !== "string")
                                return str;
                            return str.replace(/[&<>"']/g, (m)=>({
                                "&": "&amp;",
                                "<": "&lt;",
                                ">": "&gt;",
                                '"': "&quot;",
                                "'": "&#39;",
                            })[m], );
                        }
                        ;

                        if (groupByCols.length > 0) {
                            const map = {};
                            let total = 0;

                            data.forEach((row)=>{
                                const key = groupByCols.map((c)=>getGranularDate(row[c], gran)).join(" | ");

                                if (!map[key])
                                    map[key] = {
                                        ...Object.fromEntries(groupByCols.map((c)=>[c, getGranularDate(row[c], gran)]), ),
                                        _val: 0,
                                        _set: new Set(),
                                        _sortKey: parseDateSort(key),
                                    };

                                let val = mode === "SUM" ? Number(row[targetCol]) || 0 : mode === "DISTINCT" ? (map[key]._set.add(row[targetCol] ?? "N/A"),
                                0) : 1;

                                map[key]._val += val;
                                if (mode !== "DISTINCT")
                                    total += val;
                            }
                            );

                            if (mode === "DISTINCT") {
                                const s = new Set();
                                data.forEach((r)=>s.add(r[targetCol]));
                                total = s.size;
                            }

                            currentGroupedData = Object.values(map).sort((a,b)=>(a._sortKey > b._sortKey ? 1 : -1)).map((g)=>{
                                const f = mode === "DISTINCT" ? g._set.size : g._val;

                                return {
                                    ...Object.fromEntries(groupByCols.map((c)=>[c, g[c]])),
                                    [aggKey]: f,
                                    "%": total > 0 ? (f / total) * 100 : 0,
                                };
                            }
                            );

                            const k = Object.keys(currentGroupedData[0]);
                            tHead.innerHTML = `<tr>${k.map((x)=>{
                                const icon = getSortIcon(x);
                                const widthStyle = columnWidths[x] ? `style=\"width:${columnWidths[x]}px;\"` : "";
                                return `<th data-col=\"${x}\" ${widthStyle} onclick=\"handleSort('${x}', true)\">${x} ${icon}</th>`;
                            }
                            ).join("")}</tr>`;

                            //           const k = Object.keys(currentGroupedData[0]);

                            //           tHead.innerHTML = `<tr>${k.map(x => `<th onclick="handleSort('${x}', true)">${x}</th>`).join('')}</tr>`;

                            tBody.innerHTML = currentGroupedData.map((r)=>`<tr>${k.map((x)=>(x === "%" ? `<td>${r[x].toFixed(1)}%</td>` : `<td>${r[x]}</td>`)).join("")}</tr>`, ).join("");

                            updateChart(currentGroupedData);
                        } else {
                            const vis = headers.filter((h)=>!hiddenColumns.has(h));
                            document.getElementById("chartSection").classList.add("hidden");

                            // FIXED: Apply sort icons to Raw Data Headers
                            tHead.innerHTML = `<tr>${vis.map((h)=>{
                                const icon = getSortIcon(h);
                                const widthStyle = columnWidths[h] ? `style=\"width:${columnWidths[h]}px;\"` : "";
                                return `<th data-col=\"${h}\" ${widthStyle} onclick=\"handleSort('${h}', false)\">${h} ${icon}</th>`;
                            }
                            ).join("")}</tr>`;

                            //            const vis = headers.filter(h => !hiddenColumns.has(h));
                            //            tHead.innerHTML = `<tr>${vis.map(h => `<th onclick="handleSort('${h}', false)">${h}</th>`).join('')}</tr>`;

                            tBody.innerHTML = data.slice(0, 300).map((r)=>`<tr>${vis.map((h)=>{
                                const cellWidthStyle = columnWidths[h] ? `style=\"width:${columnWidths[h]}px;\"` : "";
                                return `<td ${cellWidthStyle}>${formatExcelDate(r[h]) ?? ""}</td>`;
                            }
                            ).join("")}</tr>`, ).join("");
                        }

                        initResizers();

                        // Auto-fit columns on first render (then allow users to shrink columns manually)
                        if (!autoFitDone) {
                            autoFitColumns();
                            autoFitDone = true;
                        }
                    }

                    function getSortIcon(columnName) {
                        if (sortConfig.column !== columnName) {
                            return `<span class="sort-icon">↕</span>`;
                            // Neutral state
                        }
                        return sortConfig.direction === "asc" ? `<span class="sort-icon active">▲</span>` : `<span class="sort-icon active">▼</span>`;
                    }

                    function handleSort(col, isG) {
                        // 1. Toggle Direction
                        sortConfig.direction = sortConfig.column === col && sortConfig.direction === "asc" ? "desc" : "asc";
                        sortConfig.column = col;

                        // 2. Determine which data array to sort
                        const targetData = isG ? currentGroupedData : filteredDataGlobal;

                        // 3. Perform the sort
                        targetData.sort((a,b)=>{
                            let valA = a[col] ?? "";
                            let valB = b[col] ?? "";

                            // Handle numeric sorting
                            if (typeof valA === "number" && typeof valB === "number") {
                                return (valA - valB) * (sortConfig.direction === "asc" ? 1 : -1);
                            }

                            // Handle string sorting (case-insensitive)
                            valA = String(valA).toLowerCase();
                            valB = String(valB).toLowerCase();

                            if (valA < valB)
                                return sortConfig.direction === "asc" ? -1 : 1;
                            if (valA > valB)
                                return sortConfig.direction === "asc" ? 1 : -1;
                            return 0;
                        }
                        );

                        // 4. Force Table Refresh
                        // We pass the global filtered data; if Grouping is active, updateTable handles it
                        updateTable(filteredDataGlobal);
                    }

                    function updateTableFromGrouped() {
                        const tBody = document.getElementById("tBody");
                        const k = Object.keys(currentGroupedData[0]);

                        tBody.innerHTML = currentGroupedData.map((r)=>`<tr>${k.map((x)=>(x === "%" ? `<td>${r[x].toFixed(1)}%</td>` : `<td>${r[x]}</td>`)).join("")}</tr>`, ).join("");

                        updateChart(currentGroupedData);

                        initResizers();
                    }

                    function updateChart(gData) {
                        const ctx = document.getElementById("dataChart").getContext("2d");
                        const type = document.getElementById("chartType").value;
                        document.getElementById("chartSection").classList.remove("hidden");

                        if (!Array.isArray(gData) || gData.length === 0) {
                            if (myChart)
                                myChart.destroy();
                            return;
                        }

                        const groupByCols = getSelectedGroupByCols();

                        const keys = Object.keys(gData[0]);
                        const metricKeys = keys.filter((k)=>!groupByCols.includes(k) && k !== "%");
                        const metricKey = metricKeys[0] || keys[keys.length - 2] || keys[0];

                        const firstGroupKey = groupByCols.length ? groupByCols[0] : null;

                        let labels = [];
                        let datasets = [];

                        if (firstGroupKey && groupByCols.length > 1) {
                            labels = [...new Set(gData.map((r)=>r[firstGroupKey]))];

                            const seriesByRemaining = new Map();
                            gData.forEach((row)=>{
                                const seriesKey = groupByCols.slice(1).map((c)=>`${c}: ${row[c]}`).join(" | ");
                                if (!seriesByRemaining.has(seriesKey)) {
                                    seriesByRemaining.set(seriesKey, {});
                                }
                                seriesByRemaining.get(seriesKey)[row[firstGroupKey]] = Number(row[metricKey], ) || 0;
                            }
                            );

                            const colors = ["#2563eb", "#10b981", "#f59e0b", "#ef4444", "#8b5cf6", "#0ea5e9", "#ec4899", "#14b8a6", ];

                            datasets = [...seriesByRemaining.entries()].map(([seriesLabel,valMap],idx)=>({
                                label: seriesLabel,
                                data: labels.map((x)=>valMap[x] ?? 0),
                                backgroundColor: colors[idx % colors.length],
                                borderColor: colors[idx % colors.length],
                                fill: type === "line" ? false : true,
                                tension: 0.2,
                            }), );
                        } else {
                            labels = firstGroupKey ? gData.map((r)=>r[firstGroupKey]) : gData.map((r,i)=>i + 1);

                            datasets = [{
                                label: `${metricKey || "Metric"}`,
                                data: gData.map((r)=>Number(r[metricKey]) || 0),
                                backgroundColor: "#2563eb",
                                borderColor: "#2563eb",
                                fill: type === "line" ? false : true,
                                tension: 0.2,
                            }, ];
                        }

                        if (myChart)
                            myChart.destroy();

                        myChart = new Chart(ctx,{
                            type,
                            data: {
                                labels,
                                datasets,
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: {
                                    legend: {
                                        display: true,
                                        position: "top",
                                    },
                                },
                                scales: {
                                    x: {
                                        title: {
                                            display: Boolean(firstGroupKey),
                                            text: firstGroupKey || "Group",
                                        },
                                    },
                                },
                            },
                        });
                    }

                    function updateDateRangeChart() {
                        const container = document.getElementById("dateRangeChartSection");
                        const toggleBtn = document.getElementById("toggleDateRangeChartBtn");
                        const xSelect = document.getElementById("dateRangeXColumn");
                        const ySelect = document.getElementById("dateRangeYColumns");
                        const chartType = document.getElementById("dateRangeChartType")?.value || "line";

                        if (toggleBtn && container) {
                            toggleBtn.innerText = container.classList.contains("hidden") ? "▲" : "▼";
                        }

                        const selectedX = xSelect?.value;
                        const selectedYs = Array.from(ySelect?.selectedOptions || []).map((o)=>o.value, );

                        const xColumnMeta = document.getElementById("dateRangeXColumnMeta");
                        const filterMeta = document.getElementById("dateRangeFilterMeta");
                        if (xColumnMeta) {
                            xColumnMeta.innerText = `X Column: ${selectedX || "None selected"}`;
                        }

                        const filterParts = [];
                        const globalSearch = document.getElementById("globalSearch")?.value?.trim();
                        if (globalSearch)
                            filterParts.push(`Global Search: "${globalSearch}"`);

                        selectedFilterCols.forEach((col)=>{
                            const minInput = document.getElementById(`date-min-${col}`)?.value;
                            const maxInput = document.getElementById(`date-max-${col}`)?.value;
                            if (minInput || maxInput) {
                                filterParts.push(`${col}: ${minInput || "..."} → ${maxInput || "..."}`, );
                            }
                            const selectedSet = activeSelections[col];
                            if (selectedSet && selectedSet.size > 0) {
                                const values = [...selectedSet].slice(0, 5).join(", ");
                                filterParts.push(`${col}: {${values}${selectedSet.size > 5 ? ", ..." : ""}}`, );
                            }
                        }
                        );

                        if (filterMeta) {
                            filterMeta.innerText = "Filters: " + (filterParts.length > 0 ? filterParts.join(" | ") : "None applied");
                        }

                        if (!container || !selectedX || selectedYs.length === 0) {
                            container?.classList.add("hidden");
                            return;
                        }

                        const minVal = document.getElementById("dateRangeMin")?.value;
                        const maxVal = document.getElementById("dateRangeMax")?.value;
                        const gran = document.getElementById("dateGranularity")?.value || "none";
                        const aggMode = document.getElementById("dateRangeAgg")?.value || "SUM";
                        console.log("Date range chart aggMode", aggMode, "selectedYs", selectedYs);

                        const data = filteredDataGlobal || [];

                        const xValues = [];
                        const xCounts = {};
                        const accumulated = {};
                        const counts = {};
                        selectedYs.forEach((y)=>{
                            accumulated[y] = {};
                            counts[y] = {};
                        }
                        );

                        data.forEach((row)=>{
                            const xRaw = row[selectedX];
                            const d = excelSerialToJsDate(xRaw);
                            if (!d || isNaN(d.getTime()))
                                return;

                            const dt = new Date(d).setHours(0, 0, 0, 0);
                            if (minVal) {
                                const minT = new Date(minVal).setHours(0, 0, 0, 0);
                                if (dt < minT)
                                    return;
                            }
                            if (maxVal) {
                                const maxT = new Date(maxVal).setHours(0, 0, 0, 0);
                                if (dt > maxT)
                                    return;
                            }

                            const xLabel = getGranularDate(xRaw, gran);
                            if (!xValues.includes(xLabel))
                                xValues.push(xLabel);
                            xCounts[xLabel] = (xCounts[xLabel] || 0) + 1;

                            selectedYs.forEach((y)=>{
                                const value = Number(row[y]);
                                const currentSum = accumulated[y][xLabel] || 0;
                                const currentCount = counts[y][xLabel] || 0;

                                counts[y][xLabel] = currentCount + 1;
                                if (!isNaN(value)) {
                                    accumulated[y][xLabel] = currentSum + value;
                                } else {
                                    accumulated[y][xLabel] = currentSum;
                                }
                            }
                            );
                        }
                        );

                        const isGroupedPerX = Object.values(xCounts).some((c)=>c > 1);
                        const groupedMeta = document.getElementById("dateRangeGroupedMeta");
                        if (groupedMeta) {
                            groupedMeta.innerText = `Y grouped per X: ${isGroupedPerX ? "Yes" : "No"}`;
                        }

                        const normalized = {};
                        selectedYs.forEach((y)=>{
                            normalized[y] = {};
                            xValues.forEach((xLabel)=>{
                                const sum = accumulated[y][xLabel] || 0;
                                const count = counts[y][xLabel] || 0;
                                if (aggMode === "COUNT") {
                                    normalized[y][xLabel] = count;
                                } else if (aggMode === "AVG") {
                                    normalized[y][xLabel] = count > 0 ? sum / count : 0;
                                } else {
                                    normalized[y][xLabel] = sum;
                                }
                            }
                            );
                        }
                        );

                        const labels = [...xValues].sort((a,b)=>{
                            const va = parseDateSort(a);
                            const vb = parseDateSort(b);
                            if (typeof va === "number" && typeof vb === "number")
                                return va - vb;
                            if (va < vb)
                                return -1;
                            if (va > vb)
                                return 1;
                            return 0;
                        }
                        );

                        if (!labels.length) {
                            container.classList.add("hidden");
                            return;
                        }

                        container.classList.remove("hidden");

                        const colors = ["#10b981", "#3b82f6", "#f59e0b", "#ef4444", "#8b5cf6", "#0ea5e9", ];

                        let chartConfig;

                        if (chartType === "pie") {
                            const totals = selectedYs.map((y)=>labels.reduce((sum,label)=>sum + (normalized[y][label] || 0), 0), );
                            chartConfig = {
                                type: "pie",
                                data: {
                                    labels: selectedYs,
                                    datasets: [{
                                        label: `Y Totals (${aggMode})`,
                                        data: totals,
                                        backgroundColor: selectedYs.map((_,i)=>colors[i % colors.length], ),
                                    }, ],
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: {
                                        title: {
                                            display: true,
                                            text: `Date Range Chart (${selectedX || "Date"})`,
                                        },
                                    },
                                },
                            };
                        } else {
                            chartConfig = {
                                type: chartType === "bar" ? "bar" : "line",
                                data: {
                                    labels,
                                    datasets: selectedYs.map((y,idx)=>({
                                        label: `${y} (${aggMode})`,
                                        data: labels.map((label)=>normalized[y][label] || 0),
                                        borderColor: colors[idx % colors.length],
                                        backgroundColor: colors[idx % colors.length],
                                        fill: chartType === "line" ? false : true,
                                    })),
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: {
                                        legend: {
                                            display: true,
                                            position: "top"
                                        },
                                        title: {
                                            display: true,
                                            text: `Date Range Chart (${selectedX || "Date"})`,
                                        },
                                    },
                                    scales: {
                                        x: {
                                            title: {
                                                display: true,
                                                text: selectedX || "Date",
                                            },
                                        },
                                    },
                                },
                            };
                        }

                        const ctx = document.getElementById("dateRangeChart").getContext("2d");
                        if (dateRangeChart)
                            dateRangeChart.destroy();
                        dateRangeChart = new Chart(ctx,chartConfig);
                    }

                    function downloadDateRangeChart() {
                        const link = document.createElement("a");
                        link.download = "DateRangeChart.png";
                        link.href = document.getElementById("dateRangeChart").toDataURL("image/png");
                        link.click();
                    }

                    function downloadExcel() {
                        // 1. Determine if we are currently in "Grouping" mode
                        const groupByCols = getSelectedGroupByCols();
                        const isGroupingActive = groupByCols.length > 0;

                        // 2. Select the correct dataset based on the active UI view
                        let dataToExport = isGroupingActive ? currentGroupedData : filteredDataGlobal;

                        if (!dataToExport || dataToExport.length === 0) {
                            alert("No data available to export with current filters.");
                            return;
                        }

                        // 3. If not grouping, export only visible columns (in header order)
                        if (!isGroupingActive) {
                            const visibleCols = headers.filter((h)=>!hiddenColumns.has(h));
                            dataToExport = dataToExport.map((row)=>Object.fromEntries(visibleCols.map((c)=>[c, row[c]])), );
                        }

                        // 4. Create worksheet and download
                        const ws = XLSX.utils.json_to_sheet(dataToExport);
                        const wb = XLSX.utils.book_new();
                        XLSX.utils.book_append_sheet(wb, ws, "Exported_Results");

                        // Tip: Dynamic filename based on view
                        const fileName = isGroupingActive ? "Analytics_Summary.xlsx" : "Filtered_Records.xlsx";
                        XLSX.writeFile(wb, fileName);
                    }

                    function downloadChart() {
                        const link = document.createElement("a");
                        link.download = "Chart.png";
                        link.href = document.getElementById("dataChart").toDataURL("image/png");
                        link.click();
                    }

                    function parseDateSort(s) {
                        const d = new Date(s);
                        if (!isNaN(d))
                            return d.getTime();
                        return s;
                    }

                    function getGranularDate(v, m) {
                        // Keep non-date-like strings as-is to avoid incorrect coercion.
                        if (typeof v === "string") {
                            const trimmed = v.trim();
                            const isoDate = /^\d{4}-\d{2}-\d{2}$/;
                            const usDate = /^\d{1,2}\/\d{1,2}\/\d{2,4}$/;
                            if (!isoDate.test(trimmed) && !usDate.test(trimmed)) {
                                return v;
                            }
                        }

                        const d = excelSerialToJsDate(v);

                        if (!d || isNaN(d))
                            return formatExcelDate(v);

                        if (m === "month")
                            return d.toLocaleString("default", {
                                month: "short",
                                year: "numeric",
                            });
                        if (m === "quarter")
                            return `Q${Math.floor(d.getMonth() / 3) + 1} ${d.getFullYear()}`;
                        if (m === "year")
                            return String(d.getFullYear());

                        return d.toLocaleDateString();
                    }

                    function jsDateToExcelStr(s) {
                        return s ? jsDateToExcelObj(new Date(s)) : null;
                    }

                    function jsDateToExcelObj(d) {
                        return Math.round((d - new Date(1899,11,30)) / (24 * 60 * 60 * 1000));
                    }

                    function formatExcelDate(v) {
                        if (v instanceof Date)
                            return v.toLocaleDateString();
                        if (isExcelDate(v))
                            return XLSX.utils.format_cell({
                                v,
                                t: "d"
                            });
                        return v;
                    }

                    function toggleCol(c) {
                        hiddenColumns.has(c) ? hiddenColumns.delete(c) : hiddenColumns.add(c);
                        runFilter();
                    }

                    function toggleColumnMenu(e) {
                        e.stopPropagation();
                        document.getElementById("columnToggleMenu").classList.toggle("hidden");
                    }

                    function resetFilters() {
                        // 1. Clear the global search input
                        document.getElementById("globalSearch").value = "";

                        // 2. Reset the sorting configuration to default
                        sortConfig = {
                            column: null,
                            direction: "asc"
                        };

                        // 3. Re-initialize the interface and data
                        buildInterface();
                    }

                    function resetColumnWidths() {
                        // Clear any saved widths and allow the browser to auto-fit again
                        columnWidths = {};
                        autoFitDone = false;
                        runFilter();
                    }

                    function toggleTheme() {
                        document.body.classList.toggle("dark-mode");
                        document.getElementById("themeBtn").innerText = document.body.classList.contains("dark-mode") ? "☀️ Light" : "🌙 Dark";
                    }

                    let devModeActive = false;

                    function toggleDevMode() {
                        devModeActive = !devModeActive;
                        const panel = document.getElementById("debugPanel");
                        const status = document.getElementById("devStatus");

                        panel.style.display = devModeActive ? "block" : "none";
                        status.innerText = devModeActive ? "ON" : "OFF";

                        logDebug("Developer Mode " + (devModeActive ? "Enabled" : "Disabled"));
                    }

                    function logDebug(message) {
                        if (!devModeActive)
                            return;

                        const list = document.getElementById("debugList");
                        const entry = document.createElement("div");
                        entry.className = "debug-entry";

                        const now = new Date();
                        const ts = now.getHours().toString().padStart(2, "0") + ":" + now.getMinutes().toString().padStart(2, "0") + ":" + now.getSeconds().toString().padStart(2, "0");

                        entry.innerHTML = `<span class="debug-timestamp">[${ts}]</span> ${message}`;
                        list.prepend(entry);
                        // Newest on top
                    }

                        function showLoading() {
                          const toast = document.querySelector("#statusToast") || createToast();
                          
                          // Show the spinner while the computer "thinks"
                          toast.innerHTML = `
                            <div class="spinner"></div>
                            <div style="font-size: 14px; color: #60a5fa;">Calculating Summary...</div>
                          `;
                          
                          toast.classList.remove("hidden-toast");
                        }
                        


                    function showFilterStatus(recordCount) {
                        const toast = document.querySelector("#statusToast") || createToast();

                        // 1. Grab values using the Manager (document)
                        const search = document.querySelector("#globalSearch").value || "All Data";
                        const groups = getSelectedGroupByCols().join(", ") || "None";
                        const agg = document.querySelector("#aggColumn").value;

                        // 2. Build the "Dashboard Summary"
                        toast.innerHTML = `
                                  <div style="font-size: 18px; margin-bottom: 10px;">📊 <b>Analysis Update</b></div>
                                  <div style="border-top: 1px solid #555; padding-top: 10px; text-align: left;">
                                    <p>🔍 <b>Search:</b> ${search}</p>
                                    <p>📂 <b>Grouping:</b> ${groups}</p>
                                    <p>🧮 <b>Method:</b> ${agg}</p>
                                    <hr style="border: 0; border-top: 1px id="555;">
                                    <p style="font-size: 16px; color: #60a5fa;">✅ <b>Found:</b> ${recordCount} records</p>
                                  </div>
                                `;

                        // 3. Animation Logic
                        toast.classList.remove("hidden-toast");

                          // THE DISMISS LOGIC:
                          // Create a function that hides the toast
                          const dismissToast = () => {
                            toast.classList.add("hidden-toast");
                            // Stop listening for clicks once it's hidden to save energy
                            window.removeEventListener("click", dismissToast);
                          };
                        
                          // Listen for a click ANYWHERE in the window to dismiss early
                          // 'true' ensures we catch the click as it travels down the page
                          window.addEventListener("click", dismissToast, true);

                                
                        clearTimeout(window.toastTimer);
                        window.toastTimer = setTimeout(()=>{
                            toast.classList.add("hidden-toast");
                        }
                        , 5000);
                        // Shows for 5 seconds
                    }

                    // Helper to build the div if it doesn't exist
                    function createToast() {
                        const div = document.createElement("div");
                        div.id = "statusToast";
                        div.classList.add("hidden-toast");
                        document.body.appendChild(div);
                        return div;
                    }
                </script>
    </body>
</html>
