<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submittal Tracker Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --approved: #10b981;
    --awc: #00d4ff;
    --nap: #ef4444;
    --info: #8b5cf6;
    --rej: #f97316;
    --void: #475569;
    --pen: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── UPLOAD SCREEN ── */
  #upload-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    background: radial-gradient(ellipse at 50% 40%, #0d1f3c 0%, #0a0e1a 70%);
  }

  .upload-title {
    font-size: 2.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
    text-align: center;
  }

  .upload-sub {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 3rem;
    font-weight: 300;
    text-align: center;
  }

  .drop-zone {
    width: 480px;
    max-width: 95vw;
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.03), rgba(124,58,237,0.03));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 40px rgba(0,212,255,0.15);
  }

  .drop-zone:hover::before, .drop-zone.drag-over::before { opacity: 1; }

  .drop-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    display: block;
  }

  .drop-zone h3 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .drop-zone p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }

  .btn-upload {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), #0099cc);
    color: #000;
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 0.7rem 2rem;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,212,255,0.3); }

  .file-hint {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .demo-btn {
    margin-top: 1.5rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Sora', sans-serif;
    font-size: 0.85rem;
    padding: 0.6rem 1.5rem;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .demo-btn:hover { border-color: var(--accent2); color: var(--text); }

  /* ── DASHBOARD ── */
  #dashboard { display: none; flex-direction: column; min-height: 100vh; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .topbar-left { display: flex; align-items: center; gap: 1rem; }

  .logo {
    font-size: 1.1rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .file-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.2rem 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .btn-reload {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Sora', sans-serif;
    font-size: 0.8rem;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-reload:hover { border-color: var(--accent); color: var(--accent); }

  /* ── TABS ── */
  .tab-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    padding: 0.85rem 1.2rem;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    user-select: none;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── MAIN CONTENT ── */
  .content {
    flex: 1;
    padding: 2rem;
    max-width: 1600px;
    width: 100%;
    margin: 0 auto;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── KPI CARDS ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .kpi-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent-color, var(--accent));
  }

  .kpi-card:hover { border-color: var(--accent-color, var(--accent)); }

  .kpi-label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
    font-family: 'DM Mono', monospace;
  }

  .kpi-value {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 0.3rem;
  }

  .kpi-sub {
    font-size: 0.75rem;
    color: var(--muted);
  }

  /* ── CHART GRID ── */
  .chart-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.4rem;
    transition: border-color 0.2s;
  }

  .chart-card:hover { border-color: rgba(0,212,255,0.3); }

  .chart-card.col-8 { grid-column: span 8; }
  .chart-card.col-6 { grid-column: span 6; }
  .chart-card.col-4 { grid-column: span 4; }
  .chart-card.col-12 { grid-column: span 12; }

  @media (max-width: 1100px) {
    .chart-card.col-8, .chart-card.col-6, .chart-card.col-4, .chart-card.col-12 {
      grid-column: span 12;
    }
  }

  @media (max-width: 700px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .content { padding: 1rem; }
    .topbar { padding: 0.75rem 1rem; }
    .tab-bar { padding: 0 1rem; }
  }

  .chart-title {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 1.2rem;
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .chart-title .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  .chart-wrap {
    position: relative;
    height: 220px;
  }

  .chart-wrap.tall { height: 280px; }
  .chart-wrap.short { height: 160px; }

  /* ── STATUS LEGEND ── */
  .status-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 0.8rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── APPROVAL SUMMARY TABLE ── */
  .summary-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }

  .summary-table th {
    text-align: left;
    padding: 0.5rem 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }

  .summary-table td {
    padding: 0.55rem 0.75rem;
    border-bottom: 1px solid rgba(30,45,69,0.5);
    color: var(--text);
  }

  .summary-table tr:last-child td { border-bottom: none; }

  .summary-table tr:hover td { background: rgba(255,255,255,0.02); }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 500;
  }

  .pct-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin-top: 2px;
    overflow: hidden;
  }

  .pct-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
  }

  .section-dept-badge {
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(124,58,237,0.15));
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 6px;
    padding: 0.2rem 0.7rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  /* ── LOADING ── */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,14,26,0.9);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: var(--muted);
    font-size: 0.85rem;
    font-family: 'DM Mono', monospace;
  }


  /* ── DISCIPLINE FILTER ── */
  .disc-filter-wrap {
    position: relative;
    flex-shrink: 0;
  }

  .disc-filter-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 0.82rem;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .disc-filter-btn:hover {
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,0.15);
  }

  .disc-arrow { font-size: 0.65rem; color: var(--muted); }

  .disc-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    width: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    z-index: 200;
    overflow: hidden;
  }

  .disc-dropdown.open { display: block; }

  .disc-dd-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .disc-dd-action {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Sora', sans-serif;
    font-size: 0.72rem;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .disc-dd-action:hover { border-color: var(--accent); color: var(--accent); }

  .disc-dd-list {
    max-height: 260px;
    overflow-y: auto;
    padding: 0.4rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .disc-dd-item {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.3rem 0.6rem;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    transition: all 0.15s;
    user-select: none;
  }

  .disc-dd-item:hover { border-color: var(--accent); }

  .disc-dd-item.selected {
    background: rgba(0,212,255,0.12);
    border-color: var(--accent);
  }

  .disc-dd-item input[type=checkbox] { display: none; }

  .disc-dd-code {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
  }

  .disc-dd-item.selected .disc-dd-code { color: var(--accent); }

  /* ── DISCIPLINE PILLS ── */
  .disc-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .disc-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.25rem 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .disc-pill span { color: var(--text); font-weight: 500; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Processing submittal data…</div>
</div>

<!-- UPLOAD SCREEN -->
<div id="upload-screen">
  <div class="upload-title">Submittal Tracker Dashboard</div>
  <div class="upload-sub">Upload your Excel submittal tracker to generate an interactive project dashboard</div>

  <div class="drop-zone" id="drop-zone">
    <span class="drop-icon">📊</span>
    <h3>Drop your Excel file here</h3>
    <p>Supports .xlsx and .xls files with standard submittal tracker format</p>
    <div style="position:relative;display:inline-block">
      <span class="btn-upload" style="display:inline-block">Choose File</span>
      <input type="file" id="file-input" accept=".xlsx,.xls" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%">
    </div>
    <div class="file-hint">Accepted: .xlsx · .xls</div>
  </div>

  <button class="demo-btn" id="demo-btn">Load Sample Data (embedded)</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">◈ Submittal Tracker</div>
      <div class="file-badge" id="file-badge">—</div>
    </div>
    <button class="btn-reload" onclick="resetDashboard()">↩ Load Another File</button>
  </div>

  <div class="tab-bar" id="tab-bar"></div>

  <div class="content" id="tab-content"></div>
</div>

function parseExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: null });
        resolve(processRows(rows));
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function isValidDocId(id) {
  if (!id) return false;
  const s = String(id).trim();
  if (s.includes('Reply') || s.includes('#') || s.includes('NA-NA')) return false;
  return /^\d{6}-[A-Z0-9]{4,6}-[A-Z]{2,3}-[A-Z]{1,5}-\d{4}$/.test(s);
}

function toYYYYMM(d) {
  if (!d) return null;
  const dt = d instanceof Date ? d : new Date(d);
  if (isNaN(dt)) return null;
  return dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2,'0');
}

function processRows(rows) {
  const deptMap = { 'Project ': 'Project', 'Piping/ BS': 'Piping/BS', 'Const;': 'Const' };
  const valid = rows.filter(r => isValidDocId(r['Document_ID']));
  valid.forEach(r => {
    r['Department'] = deptMap[r['Department']] || r['Department'];
    r['_month'] = toYYYYMM(r['Submission_Date']);
  });

  const depts = [...new Set(valid.map(r => r['Department']).filter(Boolean))].sort();
  const allDiscs = [...new Set(valid.map(r => r['Discipline']).filter(Boolean))].sort();
  const overall = buildOverallStats(valid);
  const departments = {};
  depts.forEach(d => { departments[d] = buildDeptStats(valid.filter(r => r['Department'] === d)); });

  return { overall: { ...overall, departments: depts, allDiscs }, departments, _rawRows: valid };
}

function groupBy(arr, key) {
  return arr.reduce((acc, r) => { acc[r[key]] = (acc[r[key]] || 0) + 1; return acc; }, {});
}

function buildSCurve(rows) {
  const firstSub = {};
  rows.forEach(r => {
    const id = r['Document_ID'], m = r['_month'];
    if (!m) return;
    if (!firstSub[id] || m < firstSub[id]) firstSub[id] = m;
  });
  const monthly = {};
  Object.values(firstSub).forEach(m => { monthly[m] = (monthly[m] || 0) + 1; });
  const sorted = Object.keys(monthly).sort();
  let cum = 0;
  return sorted.map(m => { cum += monthly[m]; return { Month: m, count: monthly[m], cumulative: cum }; });
}

function buildMonthlyFreq(rows) {
  const monthly = {};
  rows.forEach(r => { if (r['_month']) monthly[r['_month']] = (monthly[r['_month']] || 0) + 1; });
  const sorted = Object.keys(monthly).sort();
  return sorted.map(m => ({ Month: m, count: monthly[m] }));
}

function buildOverallStats(valid) {
  const uniqueIds = new Set(valid.map(r => r['Document_ID']));
  return {
    total_submissions: valid.length,
    unique_docs: uniqueIds.size,
    review_status: groupBy(valid, 'Review_Status'),
    latest_approval: groupBy(valid.filter(r => r['Latest_Approval_Status']), 'Latest_Approval_Status'),
    scurve: buildSCurve(valid),
    monthly_freq: buildMonthlyFreq(valid),
  };
}

function buildDeptStats(rows) {
  return {
    total_submissions: rows.length,
    unique_docs: new Set(rows.map(r => r['Document_ID'])).size,
    review_status: groupBy(rows, 'Review_Status'),
    latest_approval: groupBy(rows.filter(r => r['Latest_Approval_Status']), 'Latest_Approval_Status'),
    scurve: buildSCurve(rows),
    monthly_freq: buildMonthlyFreq(rows),
    discipline: groupBy(rows.filter(r => r['Discipline']), 'Discipline'),
  };
}

function mkChart(id, config) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const chart = new Chart(canvas, config);
  allCharts.push(chart);
  return chart;
}

function scurveChart(id, scurve, freqData) {
  // Filter out outlier future months (> current month)
  const now = new Date();
  const nowKey = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const sc = scurve.filter(d => d.Month <= nowKey);
  const fr = freqData ? freqData.filter(d => d.Month <= nowKey) : null;

  const labels = sc.map(d => d.Month);
  const datasets = [{
    label: 'Cumulative Unique Docs (S-Curve)',
    data: sc.map(d => d.cumulative),
    borderColor: '#00d4ff',
    backgroundColor: 'rgba(0,212,255,0.08)',
    fill: true,
    tension: 0.4,
    pointRadius: 2,
    borderWidth: 2,
    yAxisID: 'y',
  }];

  if (fr) {
    const freqMap = {};
    fr.forEach(d => { freqMap[d.Month] = d.count; });
    datasets.push({
      label: 'Monthly Submissions',
      data: labels.map(m => freqMap[m] || 0),
      type: 'bar',
      backgroundColor: 'rgba(124,58,237,0.4)',
      borderColor: 'rgba(124,58,237,0.6)',
      borderWidth: 1,
      yAxisID: 'y2',
    });
  }

  mkChart(id, {
    type: 'line',
    data: { labels, datasets },
    options: {
      ...CHART_DEFAULTS,
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 10 }, maxTicksLimit: 12 }, grid: { color: 'rgba(30,45,69,0.5)' } },
        y: { position: 'left', ticks: { color: '#00d4ff', font: { size: 10 } }, grid: { color: 'rgba(30,45,69,0.5)' }, title: { display: true, text: 'Cumulative', color: '#64748b', font: { size: 10 } } },
        y2: fr ? { position: 'right', ticks: { color: '#7c3aed', font: { size: 10 } }, grid: { display: false }, title: { display: true, text: 'Monthly', color: '#64748b', font: { size: 10 } } } : undefined,
      },
      plugins: { ...CHART_DEFAULTS.plugins, legend: { display: true, position: 'top', labels: { color: '#64748b', font: { size: 10 }, boxWidth: 12 } } },
    }
  });
}

// Collect all disciplines across departments (from embedded data or raw rows)
function getAllDiscs(data) {
  if (data.overall.allDiscs) return data.overall.allDiscs;
  const discs = new Set();
  Object.values(data.departments).forEach(d => {
    if (d.discipline) Object.keys(d.discipline).forEach(k => discs.add(k));
  });
  return [...discs].sort();
}

// Filter embedded data by selected disciplines using per-dept discipline info
function filterByDiscs(data, selectedDiscs) {
  if (!selectedDiscs || selectedDiscs.length === 0) return data;
  // If we have raw rows, filter directly
  if (data._rawRows) {
    const filtered = data._rawRows.filter(r => selectedDiscs.includes(r['Discipline']));
    const depts = data.overall.departments;
    const overall = buildOverallStats(filtered);
    const departments = {};
    depts.forEach(d => {
      const dRows = filtered.filter(r => r['Department'] === d);
      if (dRows.length > 0) departments[d] = buildDeptStats(dRows);
      else departments[d] = data.departments[d]; // keep original dept for KPI display
    });
    return { overall: { ...overall, departments: depts, allDiscs: data.overall.allDiscs }, departments, _rawRows: data._rawRows };
  }
  // Embedded data: approximate by scaling dept discipline proportions
  const depts = data.overall.departments;
  const newDepts = {};
  depts.forEach(d => {
    const dd = data.departments[d];
    if (!dd || !dd.discipline) { newDepts[d] = dd; return; }
    const totalDisc = Object.entries(dd.discipline)
      .filter(([k]) => selectedDiscs.includes(k))
      .reduce((s,[,v]) => s+v, 0);
    const totalAll = Object.values(dd.discipline).reduce((s,v) => s+v, 0);
    if (totalAll === 0) { newDepts[d] = dd; return; }
    const ratio = totalDisc / totalAll;
    // Scale all counts by ratio
    const scale = obj => {
      const r = {};
      Object.entries(obj).forEach(([k,v]) => { r[k] = Math.round(v * ratio); });
      return r;
    };
    const scaleArr = arr => arr.map(pt => ({ ...pt, count: Math.round(pt.count * ratio), cumulative: Math.round(pt.cumulative * ratio) }));
    // Re-cumulate scurve
    const sc = scaleArr(dd.scurve);
    let cum = 0;
    sc.forEach(pt => { cum += pt.count; pt.cumulative = cum; });

    newDepts[d] = {
      total_submissions: Math.round(dd.total_submissions * ratio),
      unique_docs: Math.round(dd.unique_docs * ratio),
      review_status: scale(dd.review_status),
      latest_approval: scale(dd.latest_approval),
      scurve: sc,
      monthly_freq: scaleArr(dd.monthly_freq),
      discipline: Object.fromEntries(Object.entries(dd.discipline).filter(([k]) => selectedDiscs.includes(k))),
    };
  });
  // Rebuild overall from newDepts
  const mergeObj = (objs) => {
    const result = {};
    objs.forEach(obj => { if (!obj) return; Object.entries(obj).forEach(([k,v]) => { result[k] = (result[k]||0) + v; }); });
    return result;
  };
  const allVals = Object.values(newDepts);
  const newTotal = allVals.reduce((s,d) => s + (d?.total_submissions||0), 0);
  const newUnique = allVals.reduce((s,d) => s + (d?.unique_docs||0), 0);
  const newReview = mergeObj(allVals.map(d => d?.review_status));
  const newApproval = mergeObj(allVals.map(d => d?.latest_approval));
  // Rebuild merged scurve
  const monthMap = {};
  allVals.forEach(d => { if (!d?.scurve) return; d.scurve.forEach(pt => { monthMap[pt.Month] = (monthMap[pt.Month]||0) + pt.count; }); });
  const sortedMonths = Object.keys(monthMap).sort();
  let c = 0;
  const newScurve = sortedMonths.map(m => { c += monthMap[m]; return { Month: m, count: monthMap[m], cumulative: c }; });
  const freqMap = {};
  allVals.forEach(d => { if (!d?.monthly_freq) return; d.monthly_freq.forEach(pt => { freqMap[pt.Month] = (freqMap[pt.Month]||0) + pt.count; }); });
  const newFreq = Object.keys(freqMap).sort().map(m => ({ Month: m, count: freqMap[m] }));

  return {
    overall: { total_submissions: newTotal, unique_docs: newUnique, review_status: newReview, latest_approval: newApproval, scurve: newScurve, monthly_freq: newFreq, departments: depts, allDiscs: data.overall.allDiscs },
    departments: newDepts,
    _rawRows: data._rawRows,
  };
}

let _overallSelectedDiscs = []; // [] = all

function renderOverall(data, selectedDiscs) {
  _overallSelectedDiscs = selectedDiscs || [];
  const allDiscs = getAllDiscs(data);
  const filteredData = _overallSelectedDiscs.length > 0 ? filterByDiscs(data, _overallSelectedDiscs) : data;
  const o = filteredData.overall;
  const depts = data.overall.departments; // always show all depts

  const deptSubs = depts.map(d => filteredData.departments[d]?.total_submissions || 0);
  const deptDocs = depts.map(d => filteredData.departments[d]?.unique_docs || 0);
  const deptApprovalRate = depts.map(d => {
    const dd = filteredData.departments[d];

    const app = (dd.latest_approval['Approved'] || 0) + (dd.latest_approval['Approved with Comments'] || 0);

        <div class="kpi-sub">All valid records</div>
      </div>
      <div class="kpi-card" style="--accent-color:#7c3aed">
        <div class="kpi-label">Unique Documents</div>
        <div class="kpi-value">${o.unique_docs.toLocaleString()}</div>
        <div class="kpi-sub">By Document ID</div>
      </div>
      <div class="kpi-card" style="--accent-color:#10b981">
        <div class="kpi-label">Departments</div>
        <div class="kpi-value">${depts.length}</div>
        <div class="kpi-sub">Active submitting depts</div>
      </div>
      <div class="kpi-card" style="--accent-color:#f59e0b">
        <div class="kpi-label">Avg Submissions/Doc</div>
        <div class="kpi-value">${o.unique_docs ? (o.total_submissions / o.unique_docs).toFixed(1) : '—'}</div>

      <div class="kpi-card" style="--accent-color:#10b981">
        <div class="kpi-label">Approved (Latest)</div>
        <div class="kpi-value">${(()=>{const tot=Object.values(o.latest_approval).reduce((a,b)=>a+b,0);return tot?((((o.latest_approval['Approved']||0)+(o.latest_approval['Approved with Comments']||0))/tot)*100).toFixed(0)+'%':'—';})()}</div>

// ── Discipline dropdown helpers ──
function toggleDiscDropdown() {
  const dd = document.getElementById('disc-dropdown');
  const arrow = document.getElementById('disc-arrow');
  const open = dd.classList.toggle('open');
  arrow.textContent = open ? '▴' : '▾';
}

function closeDiscDropdownOutside(e) {
  const wrap = document.querySelector('.disc-filter-wrap');
  if (wrap && !wrap.contains(e.target)) {
    const dd = document.getElementById('disc-dropdown');
    const arrow = document.getElementById('disc-arrow');
    if (dd) { dd.classList.remove('open'); }
    if (arrow) arrow.textContent = '▾';
  }
}

function onDiscChange(checkbox) {
  const val = checkbox.value;
  const item = checkbox.closest('.disc-dd-item');
  if (checkbox.checked) {
    if (!_overallSelectedDiscs.includes(val)) _overallSelectedDiscs.push(val);
    item.classList.add('selected');
  } else {
    _overallSelectedDiscs = _overallSelectedDiscs.filter(d => d !== val);
    item.classList.remove('selected');
  }
  // Re-render charts without closing dropdown
  reRenderOverallCharts();
}

function selectAllDiscs() {
  _overallSelectedDiscs = [];
  document.querySelectorAll('.disc-dd-item input').forEach(cb => { cb.checked = false; cb.closest('.disc-dd-item').classList.remove('selected'); });
  reRenderOverallCharts();
}

function clearAllDiscs() {
  _overallSelectedDiscs = [];
  document.querySelectorAll('.disc-dd-item input').forEach(cb => { cb.checked = false; cb.closest('.disc-dd-item').classList.remove('selected'); });
  reRenderOverallCharts();
}

function reRenderOverallCharts() {
  // Update button label
  const btn = document.getElementById('disc-filter-btn');
  const arrow = document.getElementById('disc-arrow');
  if (btn && arrow) {
    const label = _overallSelectedDiscs.length === 0 ? 'All Disciplines'
      : _overallSelectedDiscs.length === 1 ? _overallSelectedDiscs[0]
      : `${_overallSelectedDiscs.length} Disciplines`;
    btn.innerHTML = `<span style="color:var(--accent)">⬡</span> ${label} <span class="disc-arrow" id="disc-arrow">${arrow.textContent}</span>`;
  }

  // Destroy only overview charts, not dropdown
  allCharts.forEach(c => c.destroy());
  allCharts = [];

  const filteredData = _overallSelectedDiscs.length > 0 ? filterByDiscs(currentData, _overallSelectedDiscs) : currentData;
  const o = filteredData.overall;
  const depts = currentData.overall.departments;
  const deptSubs = depts.map(d => filteredData.departments[d]?.total_submissions || 0);
  const deptDocs = depts.map(d => filteredData.departments[d]?.unique_docs || 0);
  const deptApprovalRate = depts.map(d => {
    const dd = filteredData.departments[d];
    if (!dd) return 0;
    const tot = Object.values(dd.latest_approval).reduce((a,b)=>a+b,0);
    const app = (dd.latest_approval['Approved'] || 0) + (dd.latest_approval['Approved with Comments'] || 0);
    return tot ? Math.round((app/tot)*100) : 0;
  });

  // Update KPI cards
  const kpiGrid = document.querySelector('.kpi-grid');
  if (kpiGrid) {
    const tot = Object.values(o.latest_approval).reduce((a,b)=>a+b,0);
    const appPct = tot ? ((((o.latest_approval['Approved']||0)+(o.latest_approval['Approved with Comments']||0))/tot)*100).toFixed(0)+'%' : '—';
    const napPct = tot ? (((o.latest_approval['Not Approved']||0)/tot)*100).toFixed(0)+'%' : '—';
    const vals = kpiGrid.querySelectorAll('.kpi-value');
    if (vals[0]) vals[0].textContent = o.total_submissions.toLocaleString();
    if (vals[1]) vals[1].textContent = o.unique_docs.toLocaleString();
    if (vals[3]) vals[3].textContent = o.unique_docs ? (o.total_submissions/o.unique_docs).toFixed(1) : '—';
    if (vals[4]) vals[4].textContent = appPct;
    if (vals[5]) vals[5].textContent = napPct;
  }

  // Update status tables
  const tables = document.querySelectorAll('.summary-table');
  if (tables[0]) tables[0].closest('[style*="overflow"]').innerHTML = statusTable(o.review_status);
  if (tables[1]) tables[1].closest('[style*="overflow"]').innerHTML = statusTable(o.latest_approval);

  requestAnimationFrame(() => {
    scurveChart('c-overall-scurve', o.scurve, o.monthly_freq);
    statusDonut('c-overall-approval', o.latest_approval);
    deptBarChart('c-dept-subs', depts, deptSubs, 'Submissions');
    deptBarChart('c-dept-docs', depts, deptDocs, 'Unique Docs');
    mkChart('c-dept-approval', {
      type: 'bar',
      data: {
        labels: depts,
        datasets: [{
          label: 'Approval Rate %',
          data: deptApprovalRate,
          backgroundColor: deptApprovalRate.map(v => v >= 70 ? 'rgba(16,185,129,0.6)' : v >= 40 ? 'rgba(245,158,11,0.6)' : 'rgba(239,68,68,0.6)'),
          borderColor: deptApprovalRate.map(v => v >= 70 ? '#10b981' : v >= 40 ? '#f59e0b' : '#ef4444'),
          borderWidth: 1, borderRadius: 4,
        }]
      },
      options: {
        ...CHART_DEFAULTS,
        scales: {
          x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: 'rgba(30,45,69,0.5)' } },
          y: { min: 0, max: 100, ticks: { color: '#94a3b8', font: { size: 10 }, callback: v => v + '%' }, grid: { color: 'rgba(30,45,69,0.5)' } },
        }
      }
    });
  });
}

// ═══════════════════════════════════════
//  RENDER DEPT TAB
// ═══════════════════════════════════════
function renderDept(dept, deptData, isActive) {

  const nap = (d.latest_approval['Not Approved'] || 0);
  const pending = (d.latest_approval["Awaiting S.O.'s response"] || 0);
  const approvalRate = totalLatest ? (((approved + awc) / totalLatest) * 100).toFixed(0) : 0;

  const hasDisc = d.discipline && Object.keys(d.discipline).length > 1;

  const html = `
    <div class="section-header">
      <div class="section-title">${dept}</div>

    <div class="kpi-grid">

        <div class="kpi-label">Total Submissions</div>

      </div>
      <div class="kpi-card" style="--accent-color:#7c3aed">

        <div class="kpi-value">${approvalRate}%</div>
        <div class="kpi-sub">${(approved+awc).toLocaleString()} of ${totalLatest.toLocaleString()} docs</div>
      </div>
      <div class="kpi-card" style="--accent-color:#ef4444">
        <div class="kpi-label">Not Approved</div>
        <div class="kpi-value">${nap.toLocaleString()}</div>
        <div class="kpi-sub">${totalLatest ? ((nap/totalLatest)*100).toFixed(0) : 0}% of unique docs</div>
      </div>
      <div class="kpi-card" style="--accent-color:#f59e0b">
        <div class="kpi-label">Awaiting Response</div>
        <div class="kpi-value">${pending.toLocaleString()}</div>
        <div class="kpi-sub">Pending review outcome</div>
      </div>
      <div class="kpi-card" style="--accent-color:#94a3b8">
        <div class="kpi-label">Avg Subs / Doc</div>
        <div class="kpi-value">${d.unique_docs ? (d.total_submissions/d.unique_docs).toFixed(1) : '—'}</div>
        <div class="kpi-sub">Resubmission frequency</div>
      </div>
    </div>

    <div class="chart-grid">
      <div class="chart-card col-8">
        <div class="chart-title"><span class="dot"></span>Submission S-Curve · Unique Doc IDs + Monthly Volume</div>
        <div class="chart-wrap tall"><canvas id="c-${dept}-scurve"></canvas></div>
      </div>
      <div class="chart-card col-4">
        <div class="chart-title"><span class="dot" style="background:#10b981"></span>Latest Approval Status</div>
        <div class="chart-wrap"><canvas id="c-${dept}-approval-donut"></canvas></div>
      </div>

      <div class="chart-card col-6">
        <div class="chart-title"><span class="dot" style="background:#ef4444"></span>Review Status — All Submissions</div>
        <div style="overflow-x:auto">${statusTable(d.review_status)}</div>
      </div>
      <div class="chart-card col-6">
        <div class="chart-title"><span class="dot" style="background:#10b981"></span>Latest Approval — Unique Docs</div>

      ${hasDisc ? `

// ═══════════════════════════════════════
//  BUILD DASHBOARD
// ═══════════════════════════════════════
function buildDashboard(data, filename) {
  currentData = data;
  destroyAll();

  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
  document.getElementById('file-badge').textContent = filename || 'loaded';

  const depts = data.overall.departments;

  // Build tabs
  const tabBar = document.getElementById('tab-bar');
  tabBar.innerHTML = '';

  const tabs = ['Overview', ...depts];
  tabs.forEach((t, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.textContent = t;
    tab.onclick = () => switchTab(i, tabs, data);
    tabBar.appendChild(tab);
  });

  // Render overall
  _overallSelectedDiscs = [];
  renderOverall(data, []);
}

function switchTab(idx, tabs, data) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });

  destroyAll();

  const content = document.getElementById('tab-content');

  if (idx === 0) {
    renderOverall(data, _overallSelectedDiscs);
    return;
  }

  const dept = tabs[idx];
  const deptData = data.departments[dept];
  if (!deptData) { content.innerHTML = '<div style="color:var(--muted);padding:2rem">No data for this department.</div>'; return; }

  content.innerHTML = `<div class="tab-panel active">${renderDept(dept, deptData, true)}</div>`;

  requestAnimationFrame(() => {
    scurveChart(`c-${dept}-scurve`, deptData.scurve, deptData.monthly_freq);
    statusDonut(`c-${dept}-approval-donut`, deptData.latest_approval);
    if (deptData.discipline && Object.keys(deptData.discipline).length > 1) {
      disciplineBar(`c-${dept}-disc`, deptData.discipline);
    }
  });
}

// ═══════════════════════════════════════
//  UPLOAD HANDLERS
// ═══════════════════════════════════════
function showLoading() { document.getElementById('loading').style.display = 'flex'; }
function hideLoading() { document.getElementById('loading').style.display = 'none'; }

function handleFile(file) {
  if (!file) return;
  showLoading();
  setTimeout(async () => {
    try {
      const data = await parseExcel(file);
      hideLoading();
      buildDashboard(data, file.name);
    } catch(err) {
      hideLoading();
      alert('Error processing file: ' + err.message + '\n\nPlease ensure it is a valid submittal tracker Excel file.');
    }
  }, 100);
}

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

document.getElementById('demo-btn').addEventListener('click', () => {
  showLoading();
  setTimeout(() => {
    hideLoading();
    buildDashboard(EMBEDDED_DATA, 'Processed_Submittal_Tracker.xlsx');
  }, 200);
});

function resetDashboard() {
  destroyAll();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('file-input').value = '';
}
</script>
