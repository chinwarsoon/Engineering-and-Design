<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>TWRP C4B DCC Submission Explorer Pro | Analytics Edition</title>
        <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>
            /* Specific Table Data styling */
            #mainTable {
                font-size: var(--font-size);
                /* Links table to the global variable */
            }

            #mainTable td {
                padding: var(--td-padding);
                white-space: nowrap;
                /* Keeps data on one line for horizontal scrolling */
                vertical-align: middle;
            }

            #mainTable th {
                font-size: calc( var(--font-size) + 1px );
                /* Headers slightly larger for hierarchy */
                font-weight: 700;
                background: var(--bg);
            }

            #mainTable th:first-child, #mainTable td:first-child {
                position: sticky;
                left: 0;
                z-index: 40;
                /* Increased to stay above other headers */
                background: var(--card-bg);
                /* Prevents transparency while scrolling */
                border-right: 2px solid var(--border);
            }

            /* Fix for the top-left corner header specifically */
            #mainTable th:first-child {
                z-index: 50;
                /* Highest priority to stay above row data AND other headers */
                background: var(--bg);
            }

            #statusToast {
                position: fixed;
                /* Stays in the window even if you scroll */
                top: 50%;
                /* Push down to middle */
                left: 50%;
                /* Push right to middle */
                transform: translate(-50%, -50%);
                /* Pull back by half its own size to perfectly center */
                background: rgba(45, 45, 45, 0.95);
                /* Slightly see-through dark grey */
                color: white;
                padding: 25px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                z-index: 9999;
                /* Make sure it sits on top of charts and tables */
                text-align: center;
                min-width: 250px;
                border-top: 5px solid #60a5fa;
                /* Blue accent on top */
                transition: opacity 0.4s ease, transform 0.4s ease;
            }

            .spinner {
              border: 4px solid rgba(255, 255, 255, 0.3);
              border-radius: 50%;
              border-top: 4px solid #60a5fa; /* The "moving" blue part */
              width: 30px;
              height: 30px;
              animation: spin 1s linear infinite;
              margin: 10px auto; /* Centers it in the toast */
            }
            
            @keyframes spin {
              0% { transform: rotate(0deg); }
              100% { transform: rotate(360deg); }
            }

                    
            .hidden-toast {
                opacity: 0;
                transform: translate(-50%, -40%) scale(0.9) !important;
                /* Shrinks and drops slightly when hiding */
                pointer-events: none;
            }

            :root {
                --primary: #2563eb;
                --bg: #f8fafc;
                --card-bg: #ffffff;
                --border: #e2e8f0;
                --text-main: #1e293b;
                --accent: #10b981;
                --pivot-bg: rgba(37, 99, 235, 0.08);
                --td-padding: 8px 12px;
                --font-size: 13px;
                /* Update the global font-size variable here for general scaling */
            }

            body.dark-mode {
                --bg: #0f172a;
                --card-bg: #1e293b;
                --border: #334155;
                --text-main: #f1f5f9;
                --pivot-bg: rgba(37, 99, 235, 0.15);
            }

            body.compact {
                --td-padding: 4px 8px;
                --font-size: 11px;
            }

            /* Fine-tune the Compact Mode button behavior */
            body {
                font-family: system-ui, -apple-system, sans-serif;
                background: var(--bg);
                color: var(--text-main);
                padding: 20px;
                transition: 0.2s;
                line-height: 1.5;
                font-size: var(--font-size);
            }

            .card {
                max-width: 1600px;
                margin: 0 auto;
                background: var(--card-bg);
                padding: 2rem;
                border-radius: 12px;
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            }

            #debugPanel {
                display: none;
                /* Hidden by default */
                background: #1a202c;
                color: #4ade80;
                padding: 15px;
                margin-top: 20px;
                border-radius: 8px;
                font-family: "Courier New", monospace;
                font-size: 12px;
                max-height: 200px;
                overflow-y: auto;
                border: 1px solid #2d3748;
            }

            .debug-entry {
                margin-bottom: 4px;
                border-left: 2px solid #2d3748;
                padding-left: 8px;
            }

            .debug-timestamp {
                color: #718096;
                margin-right: 8px;
            }

            /* The unified style for all dashboard control modules */
            .dashboard-module {
                background: var(--pivot-bg) !important;
                border: 1px dashed var(--primary) !important;
                border-radius: 8px;
                padding: 10px;
                margin-top: 12px;
                margin-bottom: 12px;
                width: 100%;
                box-sizing: border-box;
                font-size: 12px;
            }

            .dashboard-module > div, .dashboard-module > section {
                margin-bottom: 5px;
                gap: 6px;
            }

            .dashboard-module .controls-row, .dashboard-module .filter-item, .dashboard-module .multiselect-box {
                margin: 0;
                gap: 6px;
            }

            .dashboard-module label, .dashboard-module select, .dashboard-module input, .dashboard-module button, .dashboard-module .btn {
                font-size: 11px;
            }

            /* Ensure the outer IDs don't add extra padding/borders */
            #step1, #step2, #filterContainerSection, #groupBySection {
                background: none;
                border: none;
                padding: 0;
            }

            /* Ensure the date input has space for the icon */
            .date-picker-custom {
                width: 50%;
                padding-right: 2px;
                /* Prevent text from hitting the icon */
                font-size: 11px;
                /* Slightly smaller font to prevent overflow */
                cursor: pointer;
            }

            .date-picker-input {
                width: 50%;
                min-height: 38px;
                padding: 8px !important;
                font-family: inherit;
                appearance: auto !important;
                /* Forces browser default UI */
                -webkit-appearance: date-field !important;
            }

            /* Ensure the native browser date picker icon is visible and clickable */
            /* Ensure the calendar icon is visible and doesn't block clicks */
            /*input[type="date"]::-webkit-calendar-picker-indicator {
/*    display: block;
/*    cursor: pointer;
/*    position: absolute;
/*    right: 8px;
/*    height: 100%;
/*    width: 20px;
/*    opacity: 1;
/*}
/* Position the native browser calendar icon correctly */
            input[type="date"]::-webkit-calendar-picker-indicator {
                display: block !important;
                position: absolute;
                background-position: right;
                background-size: contain;
                cursor: pointer;
                margin-left: 0;
                padding: 0;
                right: 1px;
                top: 50%;
                transform: translateY(-50%);
                opacity: 1;
                z-index: 10;
            }

            /* Force the date picker to be interactive */
            input[type="date"] {
                width: 48% !important;
                /* Adjust this percentage to your preference */
                min-width: 100px;
                /* Prevents it from becoming too small on mobile */
                appearance: auto !important;
                -webkit-appearance: date-field !important;
                cursor: pointer;
                position: relative;
                height: 35px;
                padding: 5px 35px 5px 5px;
                /* Added right padding to make room for icon */
                box-sizing: border-box;
                background-color: var(--card-bg);
            }

            /* Ensure all filter items have the same vertical alignment */
            .filter-item {
                background: var(--card-bg);
                /* White background for the filter card */
                padding: 10px;
                border-radius: 6px;
                border: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                gap: 5px;
            }

            /* Ensure the grid layout in the container is tight */
            #filterArea {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 12px;
                margin-top: 5px;
            }

            /* Force specific height on all interactive elements */
            .multiselect-display, input[type="date"], input[type="text"] {
                height: 40px;
                /* Fixed height for uniformity */
                box-sizing: border-box;
                /* Ensures padding doesn't add to height */
                display: flex;
                align-items: center;
            }

            /* Prevent text overflow from pushing the height out */
            .multiselect-display span:first-child {
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 85%;
            }

            /* Ensure date inputs in the flex container match the 40px height */
            .filter-item div[style*="display: flex"] {
                height: 40px;
                justify-content: space-between;
            }

            .filter-item div[style*="display: flex"] input[type="date"] {
                flex: 1;
            }

            /* Ensure the table wrapper doesn't clip the filters */
            .table-wrapper {
                overflow: auto;
                max-height: 600px;
                border: 1px solid var(--border);
                border-radius: 8px;
                position: relative;
                z-index: 10;
                /* Lower than the filters */
            }

            /* Allow columns to be resized smaller than content; truncate overflowing text */
            table {
                width: 100%;
                border-collapse: separate;
                border-spacing: 0;
                background: var(--card-bg);
                table-layout: fixed;
                /* enables fixed column width for resizing */
            }

            th {
                background: var(--bg);
                padding: var(--td-padding);
                text-align: left;
                position: sticky;
                /* Sort Indicator Styling */
                /* Forces sticky behavior */
                padding-right: 35px !important;
                /* Make room for the arrow and resizer */
                top: 0;
                z-index: 20;
                cursor: pointer;
                border-bottom: 2px solid var(--border);
                white-space: nowrap;
                min-width: 120px;
                user-select: none;
                z-index: 20;
                /* Maintain sticky header hierarchy */
            }

            .sort-icon {
                position: absolute;
                right: 16px;
                top: 50%;
                transform: translateY(-50%);
                font-size: 0.8em;
                opacity: 0.3;
                transition: opacity 0.2s;
            }

            th:hover .sort-icon {
                opacity: 0.7;
            }

            .sort-icon.active {
                opacity: 1;
                color: var(--primary);
            }

            /* Add this to your :root or top of CSS to prevent layout overflow globally */
            * {
                box-sizing: border-box;
            }

            #filterContainerSection {
                display: block;
                /* Overrides hidden when class is removed */
                clear: both;
                width: 100%;
                min-height: 50px;
                /* Forces it to have some height */
                margin-bottom: 20px;
                /* Adjust this value to increase the gap below */
                /* Ensure the filter container can show overflowing dropdowns */
                position: relative;
                z-index: 100;
                /* Higher than the table headers */
            }

            #filterArea {
                display: grid !important;
                /* Forces the grid layout */
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 15px;
            }

            #loadFilesContainer {
                width: 100%;
                overflow: hidden;
                /* Prevents children from poking out */
            }

            #upload {
                width: 100%;
                max-width: 100%;
                /* Forces it to stay inside the blue box */
                padding: 8px;
                background: var(--card-bg);
                border: 1px solid var(--border);
                border-radius: 6px;
                font-size: 12px;
            }

            /* Specific fix for the 'Choose File' button inside the input */
            #upload::-webkit-file-upload-button {
                background: var(--primary);
                color: white;
                border: none;
                padding: 5px 10px;
                border-radius: 4px;
                cursor: pointer;
            }

            #headerListContainer.hidden {
                display: none;
            }

            /* Shared styling for control containers */
            #step2 > div, #groupBySection {
                background: var( --pivot-bg ) !important;
                /* Uses your primary theme color */
                border: 1px dashed var(--primary) !important;
                transition: all 0.2s ease-in-out;
            }

            /* Ensure the inner list stands out against the light blue background */
            .filters-container.grid-layout {
                background: var(--card-bg);
                border: 1px solid var(--border);
                padding: 6px;
                display: flex;
                flex-direction: column;
                gap: 2px;
                width: 100%;
                box-sizing: border-box;
            }
            #headerList, #groupByColumnList {
                display: flex;
                flex-direction: column;
                gap: 2px;
                width: 100%;
                box-sizing: border-box;
            }
            #headerList .toggle-chip, #groupByColumnList .toggle-chip {
                width: 100%;
                justify-content: space-between;
                font-size: 10px;
                line-height: 1.2;
                white-space: normal;
                padding: 4px 8px;
                box-sizing: border-box;
            }
            #groupByColumnsWrapper {
                width: 100%;
            }

            /* Optional: Make the toggle button look distinct */
            #toggleStep2Btn {
                border-style: dashed;
                opacity: 0.8;
            }

            #toggleStep2Btn:hover {
                opacity: 1;
                background: var(--pivot-bg);
            }

            /* Universal style for both Filter Selection and Grouping */
            /* 2. Style the Chip (The Container) */
            /* The container chip */
            .toggle-chip {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 4px 10px;
                background: var(--card-bg);
                border: 1px solid var(--border);
                border-radius: 16px;
                cursor: pointer;
                font-size: 11px;
                transition: 0.2s;
            }

            .filters-container.grid-layout .toggle-chip,
            #groupByColumnList .toggle-chip,
            #headerList .toggle-chip {
                width: 100%;
                justify-content: space-between;
                font-size: 10px;
                border-radius: 6px;
                padding: 4px 8px;
            }

            .filters-container.grid-layout .toggle-chip {
                margin-bottom: 4px;
            }

            .toggle-chip:hover {
                border-color: var(--primary);
                background: rgba(var(--primary-rgb), 0.05);
            }

            .toggle-chip.active {
                background: var(--pivot-bg) !important;
                border-color: var(--primary) !important;
                color: var(--primary);
            }

            /* Hide the native checkbox completely */
            .toggle-chip input[type="checkbox"] {
                appearance: none !important;
                -webkit-appearance: none !important;
                display: none !important;
                width: 0 !important;
                height: 0 !important;
                position: absolute !important;
            }

            /* 3. The "Circle" Icon Style */
            /* The single circle indicator */
            /* 2. Style the single circle */
            .status-icon {
                width: 10px;
                height: 10px;
                border: 1.5px solid currentColor;
                border-radius: 50%;
                display: inline-block;
                flex-shrink: 0;
                background: transparent;
                transition: background 0.2s;
                box-sizing: border-box;
                /* Prevents border from doubling the size */
            }

            /* Fill the circle when active */
            .toggle-chip.active .status-icon {
                background: currentColor;
                /* This fills the existing circle */
            }

            /* 4. Remove any "ghost" circles from old CSS rules */
            .toggle-chip::before, .toggle-chip::after {
                content: none !important;
            }

            #stats {
                background: var(--pivot-bg);
                color: var(--primary);
                padding: 4px 12px;
                border-radius: 20px;
                font-family: monospace;
                /* Keeps numbers from jumping around */
                font-size: 14px;
                border: 1px solid var(--primary);
            }

            /* Frozen First Column */
            th:first-child, td:first-child {
                position: sticky;
                left: 0;
                z-index: 30;
                background: var(--card-bg);
                border-right: 2px solid var(--border);
            }

            /*        th:first-child { z-index: 40; background: var(--bg); } */
            /* Column Resizer Handle */
            .resizer {
                position: absolute;
                right: 0;
                top: 0;
                height: 100%;
                width: 6px;
                cursor: col-resize;
                z-index: 50;
            }

            .resizer:hover {
                background: var(--primary);
            }

            .resizing {
                border-right: 2px dashed var(--primary) !important;
            }

            td {
                padding: var(--td-padding);
                border-bottom: 1px solid var(--border);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                background: var(--card-bg);
            }

            /* Filters and UI */
            .header-section {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
            }

            .controls-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
                margin-bottom: 15px;
                flex-wrap: wrap;
            }

            .filters-container {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 2px;
                background: rgba(0, 0, 0, 0.03);
                padding: 15px;
                border-radius: 8px;
                margin-bottom: 20px;
                max-height: 300px;
                overflow-y: auto;
                border: 1px solid var(--border);
            }

            .multiselect-box {
                position: relative;
                width: 100%;
            }

            .multiselect-display {
                padding: 8px;
                border: 1px solid var(--border);
                border-radius: 6px;
                background: var(--card-bg);
                cursor: pointer;
                display: flex;
                justify-content: space-between;
                align-items: center;
                min-height: 38px;
            }

            /* Fix for dropdown menus being cut off */
            .multiselect-options {
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--card-bg);
                border: 1px solid var(--border);
                border-radius: 6px;
                z-index: 2000;
                /* Must be higher than sticky table headers (40) */
                max-height: 350px;
                overflow-y: auto;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
                padding: 10px;
            }

            .column-toggle-menu {
                position: absolute;
                right: 280px;
                top: 40px;
                background: var(--card-bg);
                border: 1px solid var(--border);
                padding: 15px;
                border-radius: 8px;
                z-index: 2000;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
                min-width: 200px;
            }

            .hidden {
                display: none;
            }

            .btn {
                background: var(--primary);
                color: white;
                border: none;
                padding: 5px 10px;
                border-radius: 5px;
                cursor: pointer;
                font-weight: 700;
                display: inline-flex;
                align-items: center;
                gap: 4px;
                font-size: 10px;
                line-height: 1.2;
            }

            .btn-outline, .btn-accent {
                padding: 4px 8px;
                font-size: 10px;
            }

            .btn-outline, .btn-accent, .btn {
                min-height: 28px;
            }

            .btn-outline {
                background: transparent;
                border: 1px solid var(--border);
                color: var(--text-main);
            }

            .btn-accent {
                background: var(--accent);
                color: white;
            }

            select, input[type="text"], input[type="date"] {
                padding: 6px 10px;
                border: 1px solid var(--border);
                border-radius: 6px;
                background: var(--card-bg);
                color: var(--text-main);
            }

            /* This ensures the outer ID doesn't create a "second box" */
            #groupBySection {
                background: none !important;
                border: none !important;
                padding: 0 !important;
                margin-top: 20px;
                margin-bottom: 20px;
                /* Adjust this value for more or less space */
            }

            #groupCheckboxArea {
                display: flex;
                flex-direction: column;
                gap: 2px;
                width: 100%;
                box-sizing: border-box;
                max-height: 120px;
                overflow-y: auto;
                margin: 10px 0;
            }

            #groupCheckboxArea .toggle-chip {
                width: 100%;
                justify-content: space-between;
                font-size: 10px;

            width: 100%;
                justify-content: space-between;

            label {

            #layoutWrapper {

            #sidebar {

    <body>
        <div class="card">
            <div class="header-section">
                <h2 style="margin: 0">📊 TWRP C4B DCC Submission Explorer Pro</h2>
            
            </div>
            
            <div id="sidebarToggleContainer">
                <button id="sidebarToggle" class="btn btn-outline" onclick="toggleSidebar()">⬅️</button>
            
                <div style="display: flex; gap: 10px">

                        background: none;

                        cursor: pointer;

                </div>

            </div>
            <div style="border-bottom: 1px solid var(--border); margin-bottom: 10px; width: 100%;"></div>
            <div id="layoutWrapper">

                    <div id="step1" style="width: 100%">
                        <div style="
            background: var(--pivot-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--primary);
            width: 100%;
          ">
                            <div style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 10px;
            ">
                                <label id="step1Header" style="color: var(--primary); font-weight: 700">📂 1. Load Excel File and Select Work Sheet:
            </label>
                                <button class="btn btn-outline" id="toggleStep1Btn" onclick="toggleStep1Box()" style="padding: 2px 8px; font-size: 10px; border-style: dashed">▲
            </button>
                            </div>
                            <div id="loadFilesContainer">
                                <div style="
                display: flex;
                flex-direction: column;
                gap: 10px;
                width: 100%;
              ">
                                    <input type="file" id="upload" accept=".xlsx, .xls"/>
                                    <select id="sheetSelector" class="hidden" onchange="loadSheet(this.value)" style="width: 100%"></select>
                                </div>
                            </div>
                        </div>
                    </div>
                <div id="step2" class="hidden" style="margin-top: 10px;">
                <div style="
            background: rgba(0, 0, 0, 0.03);

                <script>
                    let workbook = null
                      , rawData = []
                      , headers = []
                      , selectedFilterCols = []
                      , currentGroupedData = []
                      , filteredDataGlobal = []
                      , hiddenColumns = new Set()
                      , myChart = null
                      , dateRangeChart = null;

                    // Persist resized column widths across re-renders
                    let columnWidths = {};

                    // Track whether we've auto-fitted column widths on the current dataset
                    let autoFitDone = false;

                    let activeSelections = {}
                      , sortConfig = {
                        column: null,
                        direction: "asc"
                    };

                    function toggleFilterBox() {
                        const wrapper = document.getElementById("filterControlsWrapper");
                        const btn = document.getElementById("toggleFilterBtn");

                        if (wrapper.style.display === "none") {
                            wrapper.style.display = "block";
                            btn.innerHTML = "▲";
                        } else {
                            wrapper.style.display = "none";
                            btn.innerHTML = "▼";
                        }
                    }

                    function toggleStep1Box() {
                        const container = document.getElementById("loadFilesContainer");
                        const btn = document.getElementById("toggleStep1Btn");

                        if (container.style.display === "none") {
                            container.style.display = "block";
                            btn.innerHTML = "▲";
                        } else {
                            container.style.display = "none";
                            btn.innerHTML = "▼";
                        }
                    }

                    function toggleSidebar() {
                        const sidebar = document.getElementById("sidebar");
                        const btn = document.getElementById("sidebarToggle");

                        if (!sidebar || !btn) return;

                        if (sidebar.classList.contains("hidden")) {
                            sidebar.classList.remove("hidden");
                            btn.innerText = "⬅️";
                        } else {
                            sidebar.classList.add("hidden");
                            btn.innerText = "➡️";
                        }
                    }

                    function toggleGroupBox() {
                        const container = document.getElementById("groupControlsContainer");
                        const btn = document.getElementById("toggleGroupBtn");

                        if (container.style.display === "none") {
                            container.style.display = "flex";
                            btn.innerHTML = "▲";
                        } else {
                            container.style.display = "none";
                            btn.innerHTML = "▼";
                        }
                    }

                    function toggleStep2Box() {
                        const container = document.getElementById("headerListContainer");
                        const btn = document.getElementById("toggleStep2Btn");

                        // Using display: none for a clean "closed" state
                        if (container.style.display === "none") {
                            container.style.display = "block";
                            btn.innerHTML = "▲";
                        } else {
                            container.style.display = "none";
                            btn.innerHTML = "▼";
                        }
                    }

                    function setAllColumns(checked) {
                        document.querySelectorAll(".col-check").forEach((cb)=>{
                            cb.checked = checked;
                            syncChip(cb);
                        }
                        );
                    }

                    function selectAllColumns() {
                        setAllColumns(true);
                    }

                    function clearAllColumns() {
                        setAllColumns(false);
                    }

                    function getSelectedGroupByCols() {
                        return Array.from(document.querySelectorAll(".group-by-col-check:checked")).map((cb)=>cb.value);
                    }

                    function updateGroupBySelection() {
                        const selected = getSelectedGroupByCols();
                        const labelEl = document.getElementById("groupByLabel");
                        const badgeEl = document.getElementById("groupingBadge");
                        if (!labelEl)
                            return;
                        if (selected.length === 0) {
                            labelEl.innerText = "No grouping columns selected";
                            if (badgeEl) {
                                badgeEl.style.display = "none";
                                badgeEl.innerText = "Grouping Inactive";
                            }
                        } else if (selected.length === 1) {
                            labelEl.innerText = `Grouping: ${selected[0]}`;
                            if (badgeEl) {
                                badgeEl.style.display = "inline-block";
                                badgeEl.innerText = `Grouping: ${selected.join(", ")}`;
                            }
                        } else {
                            labelEl.innerText = `${selected.length} columns selected`;
                            if (badgeEl) {
                                badgeEl.style.display = "inline-block";
                                badgeEl.innerText = `Grouping: ${selected.join(", ")}`;
                            }
                        }
                    }

                    function syncGroupByChip(cb) {
                        const chip = cb.closest('.group-by-chip');
                        if (!chip) return;
                        if (cb.checked) {
                            chip.classList.add('active');
                        } else {
                            chip.classList.remove('active');
                        }
                    }

                    function selectAllGroupBy() {
                        document.querySelectorAll(".group-by-col-check").forEach((cb)=>{
                            cb.checked = true;
                            syncGroupByChip(cb);
                        });
                        updateGroupBySelection();
                        runFilter();
                    }

                    function clearAllGroupBy() {
                        document.querySelectorAll(".group-by-col-check").forEach((cb)=>{
                            cb.checked = false;
                            syncGroupByChip(cb);
                        });
                        updateGroupBySelection();
                        runFilter();
                    }

                    function moveGroupByOption(button, direction) {
                        const item = button.closest("div[id^='groupByItem-']");
                        if (!item)
                            return;
                        const parent = item.parentElement;
                        if (!parent)
                            return;

                        if (direction === 'top') {
                            parent.insertBefore(item, parent.firstElementChild);
                        } else if (direction === 'bottom') {
                            parent.appendChild(item);
                        } else {
                            const sibling = direction < 0 ? item.previousElementSibling : item.nextElementSibling;
                            if (!sibling)
                                return;
                            if (direction < 0) {
                                parent.insertBefore(item, sibling);
                            } else {
                                parent.insertBefore(sibling, item);
                            }
                        }

                        updateGroupBySelection();
                        runFilter();
                    }

                    // Auto-hide Step 2 after initializing to save space
                    function buildInterface() {
                        // 1. Get the selected columns from Step 2
                        selectedFilterCols = Array.from(document.querySelectorAll(".col-check:checked"), ).map((cb)=>cb.value);

                        // Clear previous selections to prevent logic conflicts with removed columns
                        activeSelections = {};

                        // Reset auto-fit so columns are sized to data after a new interface build
                        autoFitDone = false;

                        // Check if anything was selected
                        // 2. Validation: If nothing is selected, hide the section and exit
                        const section = document.getElementById("filterContainerSection");
                        if (selectedFilterCols.length === 0) {
                            alert("Please select at least one column to filter.");
                            section.classList.add("hidden");
                            section.style.display = "none";
                            return;
                        }

                        // 2. FORCE SHOW the container
                        //const section = document.getElementById('filterContainerSection');
                        section.classList.remove("hidden");
                        section.style.display = "block";
                        // Double-check it's visible

                        // document.getElementById('groupCheckboxArea').innerHTML = headers.map(h => `
                        // <label class="toggle-chip">
                        //     <input type="checkbox" value="${h}" class="group-check" onchange="syncChip(this); runFilter();">
                        //     <span class="status-icon">○</span> ${h}
                        // </label>
                        // `).join('');

                        // 3. Inject the HTML
                        // CONSOLIDATED LOOP
                        // 4. Regenerate the Filter HTML
                        const filterArea = document.getElementById("filterArea");
                        filterArea.innerHTML = selectedFilterCols.map((col)=>{
                            const sample = rawData.find((r)=>r[col] !== "" && r[col] !== null, )?.[col];
                            const isDateCol = sample instanceof Date || isExcelDate(sample);
                            //(typeof sample === 'number' && sample > 29221 && sample < 60000) ||
                            //(col.toLowerCase().includes('date')) ||
                            //(col.toLowerCase().includes('time'));

                            if (isDateCol) {
                                return `
                                         <div class="filter-item">
                                             <label> ${col}</label>
                                             <label class="toggle-chip" style="padding: 4px 8px; margin: 0; font-size: 10px; flex-shrink: 0;">
                                                 <input type="checkbox" id="blank-${col}" onchange="syncChip(this); runFilter();">
                                                 <span class="status-icon"></span> Blanks
                                             </label>
                                             <div style="display: flex; gap: 5px; margin-top: 5px;">
                                                 <input type="date" 
                                                    id="date-min-${col}" 
                                                    onchange="runFilter()" 
                                                    onclick="this.showPicker()" 
                                                    //style="width:50%;">
                                                 <input type="date" 
                                                    id="date-max-${col}" 
                                                    onchange="runFilter()" 
                                                    onclick="this.showPicker()" 
                                                    //style="width:50%;">
                        
                                              </div>
                                       </div>`;
                              } else {
                                                        return `
                                        <div class="filter-item">
                                            <label>${col}</label>
                                            <div class="multiselect-box" onclick="toggleDropdown(event, '${col}')">
                                                <div class="multiselect-display">
                                                    <span id="label-${col}">All Items</span>
                                                    <span>▼</span>
                                                </div>
                                                <div class="multiselect-options hidden" id="options-${col}" onclick="event.stopPropagation()">
                                                    <div class="selection-controls">
                                                        <span class="control-btn" onclick="bulkSelect('${col}', true, event)">All</span>
                                                        <span class="control-btn" onclick="bulkSelect('${col}', false, event)">Clear</span>
                                                    </div>
                                                    <input type="text" placeholder="Search..." oninput="filterDrop('${col}', this.value)">
                                                    <div id="list-${col}"></div>
                                                </div>
                                            </div>
                                        </div>`;
                            }
                        }
                        ).join("");

                        // 5. Update the rest of the UI (Aggregators and Column Visibility Menu)
                        const numericCols = headers.filter((h)=>rawData.some((r)=>typeof r[h] === "number" && !isExcelDate(r[h])), );
                        document.getElementById("aggColumn").innerHTML = `<option value="">-- Count --</option>
                    <optgroup label="Unique Distinct">${headers.map((h)=>`<option value="DISTINCT|${h}">${h}</option>`).join("")}</optgroup>
                    <optgroup label="Sum">${numericCols.map((h)=>`<option value="SUM|${h}">${h}</option>`).join("")}</optgroup>`;

                        const groupByColumnList = document.getElementById("groupByColumnList");
                        if (groupByColumnList) {
                            groupByColumnList.innerHTML = headers.map((h)=>`
                                <label class="toggle-chip group-by-chip" style="font-size: 11px; margin-bottom: 3px; width: 100%;">
                                    <input type="checkbox" class="group-by-col-check" value="${h}" onchange="syncGroupByChip(this); updateGroupBySelection(); runFilter();">
                                    <span class="status-icon"></span>
                                    ${h}
                                </label>
                            `).join("");
                        }
                        if (typeof updateGroupBySelection === 'function')
                            updateGroupBySelection();
                        // Sync initial chip states
                        document.querySelectorAll('.group-by-col-check').forEach((checkbox)=>syncGroupByChip(checkbox));

                        // Populate Date Range X/Y selectors
                        const dateCols = headers.filter((h)=>rawData.some((r)=>r[h]instanceof Date || isExcelDate(r[h])), );
                        const yCols = headers.filter((h)=>!dateCols.includes(h));

                        const xSelect = document.getElementById("dateRangeXColumn");
                        const ySelect = document.getElementById("dateRangeYColumns");

                        if (xSelect) {
                            xSelect.innerHTML = `<option value="">Select date column</option>`;
                            xSelect.innerHTML += dateCols.map((h)=>`<option value="${h}">${h}</option>`).join("");
                            if (dateCols.length > 0)
                                xSelect.value = dateCols[0];
                        }

                        if (ySelect) {
                            ySelect.innerHTML = yCols.map((h)=>`<option value="${h}">${h}</option>`).join("");
                            if (yCols.length > 0) {
                                for (let i = 0; i < Math.min(2, yCols.length); i++) {
                                    ySelect.options[i].selected = true;
                                }
                            }
                        }

                        const yOptions = document.getElementById("dateRangeYOptions");
                        if (yOptions) {
                            yOptions.innerHTML = yCols.map((h)=>`
                <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 12px;">
                  <input type="checkbox" value="${h}" class="date-y-option" onclick="syncYSelection(); runFilter();"/>
                  ${h}
                </label>
              `, ).join("");

                            const yCheckboxes = yOptions.querySelectorAll(".date-y-option");
                            yCheckboxes.forEach((box)=>{
                                const isSelected = Array.from(ySelect.options).some((opt)=>opt.value === box.value && opt.selected, );
                                box.checked = isSelected;
                            }
                            );
                        }

                        updateDateYLabel();

                        // Pre-fill date range based on selected date column

                    function initResizers() {
                        const ths = document.querySelectorAll("th");

                        ths.forEach((th)=>{
                            // Remove existing resizer if any to avoid duplicates

                            const oldResizer = th.querySelector(".resizer");

                            if (oldResizer)
                                oldResizer.remove();

                            const resizer = document.createElement("div");

                            resizer.classList.add("resizer");

                            th.appendChild(resizer);

                            // Prevent clicks on the resizer from also triggering sorting on the header
                            resizer.addEventListener("click", (e)=>e.stopPropagation());

                            resizer.addEventListener("mousedown", function(e) {
                                e.preventDefault();

                                e.stopPropagation();

                                const startX = e.pageX;

                                const startWidth = th.offsetWidth;

                                th.classList.add("resizing");

                                const onMouseMove = (e)=>{
                                    const width = startWidth + (e.pageX - startX);

                                    if (width > 50) {
                                        // Minimum width constraint

                                        th.style.width = width + "px";

                                        th.style.minWidth = width + "px";
                                        // Essential for table-layout: auto
                                    }
                                }
                                ;

                                const onMouseUp = ()=>{
                                    th.classList.remove("resizing");

                                    document.removeEventListener("mousemove", onMouseMove);

                                    document.removeEventListener("mouseup", onMouseUp);

                                    // Persist the resized width so it survives table rerenders
                                    if (th.dataset && th.dataset.col) {
                                        columnWidths[th.dataset.col] = th.offsetWidth;
                                    }
                                }
                                ;

                                document.addEventListener("mousemove", onMouseMove);

                                document.addEventListener("mouseup", onMouseUp);
                            });
                        }
                        );
                    }

                    // Core Data Logic

                    function isExcelDate(val) {
                        return typeof val === "number" && val > 29221 && val < 60000;
                    }

                    function excelSerialToJsDate(val) {
                        if (val instanceof Date)
                            return val;
                        if (isExcelDate(val))
                            return new Date((val - 25569) * 86400 * 1000);
                        if (typeof val === "string") {
                            const trimmed = val.trim();
                            if (trimmed === "")
                                return null;
                            // Prevent numeric strings from being interpreted as a date (e.g. '12345').
                            if (/^\d+$/.test(trimmed))
                                return null;
                            // Only parse strict ISO or common slash date formats.
                            const iso = /^\d{4}-\d{2}-\d{2}$/;
                            const slash = /^\d{1,2}\/\d{1,2}\/\d{2,4}$/;
                            if (!iso.test(trimmed) && !slash.test(trimmed))
                                return null;
                            const parsed = new Date(trimmed);
                            return !isNaN(parsed) ? parsed : null;
                        }
                        return null;
                    }
